<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿波 Apo · 机器人头部候选</title>
<link rel="stylesheet" href="ui-system.css">
<style>
  :root { color-scheme:light; }
  * { box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  body { min-height:100vh; background:linear-gradient(180deg,var(--paper),var(--paper-2)); color:var(--ink); }
  .abo-wrap { max-width:1180px; margin:0 auto; padding:24px 16px 86px; }
  .abo-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px; }
  .abo-title { margin:0 0 6px; font-size:24px; line-height:1.2; font-weight:900; letter-spacing:0; }
  .abo-sub { margin:0; color:var(--ink-dim); font-size:13px; line-height:1.65; max-width:780px; }
  .abo-back { flex:none; display:inline-flex; align-items:center; height:38px; padding:0 14px; border-radius:12px; text-decoration:none;
    background:#fff; color:var(--violet-d); border:1.5px solid var(--line); font-weight:900; font-size:13px; box-shadow:0 3px 0 #dfe4ef; }
  .abo-pickbar { margin:12px 0 18px; padding:10px 12px; border-radius:14px; background:#fff; border:1.5px solid var(--line);
    box-shadow:0 5px 0 #dfe4ef; display:flex; align-items:center; justify-content:space-between; gap:10px; color:var(--ink-2); font-size:13px; font-weight:800; }
  .abo-pickbar b { color:var(--violet-d); }
  .abo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:18px; }
  .abo-card { width:auto; background:#fff; border:1.5px solid var(--line); border-radius:18px; padding:14px;
    box-shadow:0 6px 0 #dfe4ef,0 14px 24px rgba(60,50,110,.08); position:relative; overflow:hidden;
    transition:transform .18s var(--ease-bounce), box-shadow .18s; }
  .abo-card:hover { transform:translateY(-4px); box-shadow:0 10px 0 #dfe4ef,0 20px 34px rgba(60,50,110,.13); }
  .abo-card.is-picked { border-color:var(--correct); box-shadow:0 6px 0 var(--correct-d),0 18px 32px rgba(88,204,2,.16); }
  .abo-card.is-picked::after { content:"已选"; position:absolute; top:12px; right:12px; z-index:4; padding:4px 9px; border-radius:999px;
    background:var(--correct); color:#fff; font-size:12px; font-weight:900; }
  .abo-stage { min-height:220px; border-radius:16px; border:1.5px solid var(--line); background:linear-gradient(160deg,#faf8ff,#eef1fb);
    display:grid; grid-template-columns:130px 1fr; gap:12px; align-items:center; padding:18px 16px; overflow:hidden; }
  .abo-meta { display:grid; gap:8px; padding:13px 2px 0; }
  .abo-name { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-weight:900; color:var(--ink); font-size:16px; }
  .abo-tag { display:inline-flex; width:max-content; padding:3px 8px; border-radius:999px; background:#ede9fe; color:var(--violet-d); font-size:11px; font-weight:900; }
  .abo-notes { display:grid; gap:4px; color:var(--ink-2); font-size:12px; line-height:1.5; font-weight:700; }
  .abo-choose { justify-self:start; appearance:none; border:none; cursor:pointer; height:34px; padding:0 16px; border-radius:11px;
    background:var(--correct); color:#fff; font-family:var(--font); font-weight:900; box-shadow:0 4px 0 var(--correct-d); }
  .abo-choose:active { transform:translateY(3px); box-shadow:0 1px 0 var(--correct-d); }
  .abo-bubble { position:relative; align-self:center; background:#fff; border:2px solid #e7e7f2; border-radius:18px; padding:13px 14px;
    color:var(--ink-2); font-size:13px; line-height:1.55; font-weight:800; box-shadow:0 5px 0 #dfe4ef; }
  .abo-bubble::before { content:""; position:absolute; left:-10px; top:44px; width:18px; height:18px; background:#fff;
    border-left:2px solid #e7e7f2; border-bottom:2px solid #e7e7f2; transform:rotate(45deg); }
  .abo-bubble b { color:var(--violet-d); }

  .bot { --skin:#f8fbff; --skin2:#dff7ff; --plate:#8b5cf6; --plate2:#22d3ee; --dark:#17142c; --glow:#67e8f9;
    position:relative; width:120px; height:132px; margin:auto; animation:botFloat 2.8s ease-in-out infinite;
    filter:drop-shadow(0 10px 0 rgba(91,33,182,.12)); }
  .abo-card:nth-child(2n) .bot { animation-delay:-.5s; }
  .abo-card:nth-child(3n) .bot { animation-delay:-1s; }
  @keyframes botFloat { 0%,100%{transform:translateY(2px)} 50%{transform:translateY(-6px)} }
  @keyframes blink { 0%,88%,100%{transform:scaleY(1)} 92%{transform:scaleY(.14)} }
  @keyframes wink { 0%,86%,100%{height:13px} 90%{height:4px} }
  @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 rgba(34,211,238,0)} 50%{box-shadow:0 0 18px rgba(34,211,238,.65)} }
  @keyframes scan { 0%{transform:translateX(-32px); opacity:0} 20%,80%{opacity:.9} 100%{transform:translateX(32px); opacity:0} }
  @keyframes antenna { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .bot i { position:absolute; display:block; }
  .bot .layer { border-radius:22px; background:linear-gradient(150deg,var(--skin),var(--skin2)); border:3px solid #fff; }
  .bot .plate { background:linear-gradient(135deg,var(--plate),var(--plate2)); border-radius:16px; }
  .bot .visor { background:var(--dark); border-radius:16px; animation:pulseGlow 2.6s ease-in-out infinite; }
  .bot .eye { width:12px; height:15px; border-radius:7px; background:#fff; animation:blink 4s infinite; }
  .bot .eye::after { content:""; position:absolute; left:3px; top:3px; width:5px; height:5px; border-radius:3px; background:var(--glow); }
  .bot .mini-eye { width:11px; height:13px; border-radius:5px; background:var(--glow); animation:wink 4.4s infinite; }
  .bot .mouth { width:26px; height:8px; border-radius:0 0 12px 12px; border-bottom:4px solid var(--dark); }
  .bot .dot { width:10px; height:10px; border-radius:5px; background:var(--glow); box-shadow:0 0 0 5px rgba(34,211,238,.16); animation:antenna 1.7s ease-in-out infinite; }
  .bot .bar { height:5px; border-radius:999px; background:#c4b5fd; opacity:.9; }

  .r1 .back { left:20px; top:26px; width:82px; height:78px; background:#c4b5fd; border-radius:24px; transform:rotate(-4deg); }
  .r1 .face { left:12px; top:20px; width:94px; height:88px; }
  .r1 .side.l { left:0; top:48px; width:20px; height:46px; background:var(--plate); border-radius:12px; }
  .r1 .side.r { right:1px; top:48px; width:20px; height:46px; background:var(--plate2); border-radius:12px; }
  .r1 .eye.l { left:38px; top:55px; } .r1 .eye.r { right:38px; top:55px; }
  .r1 .mouth { left:47px; top:81px; } .r1 .dot { left:55px; top:6px; }
  .r1 .bar { left:42px; bottom:7px; width:36px; }

  .r2 .back { left:18px; top:24px; width:88px; height:82px; background:#22d3ee; border-radius:18px; transform:translate(4px,5px); opacity:.28; }
  .r2 .face { left:16px; top:24px; width:88px; height:80px; border-radius:18px; }
  .r2 .visor { left:28px; top:50px; width:64px; height:30px; }
  .r2 .mini-eye.l { left:43px; top:59px; } .r2 .mini-eye.r { right:43px; top:59px; }
  .r2 .mouth { left:47px; top:86px; border-color:#6d28d9; }
  .r2 .side.l { left:4px; top:56px; width:18px; height:33px; background:#8b5cf6; border-radius:10px; }
  .r2 .side.r { right:4px; top:56px; width:18px; height:33px; background:#8b5cf6; border-radius:10px; }
  .r2 .bar { left:37px; top:14px; width:46px; background:#22d3ee; }

  .r3 .back { left:24px; top:19px; width:78px; height:88px; background:#5b21b6; border-radius:26px; }
  .r3 .face { left:13px; top:29px; width:94px; height:74px; border-radius:26px; }
  .r3 .plate { left:27px; top:44px; width:66px; height:48px; border-radius:18px; }
  .r3 .eye.l { left:43px; top:59px; background:#17142c; } .r3 .eye.r { right:43px; top:59px; background:#17142c; }
  .r3 .eye::after { background:#fff; }
  .r3 .mouth { left:47px; top:82px; border-color:#fff; }
  .r3 .chip { left:45px; top:6px; width:30px; height:20px; border-radius:8px; background:#fbbf24; }
  .r3 .bar { left:30px; bottom:10px; width:60px; background:#a78bfa; }

  .r4 .back { left:18px; top:31px; width:90px; height:78px; background:#dff7ff; border-radius:18px; }
  .r4 .face { left:22px; top:20px; width:78px; height:88px; border-radius:20px; }
  .r4 .visor { left:31px; top:52px; width:58px; height:26px; border-radius:999px; }
  .r4 .mini-eye.l { left:45px; top:59px; } .r4 .mini-eye.r { right:45px; top:59px; }
  .r4 .scan { left:42px; top:54px; width:4px; height:22px; border-radius:5px; background:#fff; opacity:.8; animation:scan 2s linear infinite; }
  .r4 .mouth { left:50px; top:86px; width:20px; }
  .r4 .side.l { left:6px; top:62px; width:20px; height:30px; background:#22d3ee; border-radius:9px; }
  .r4 .side.r { right:6px; top:62px; width:20px; height:30px; background:#8b5cf6; border-radius:9px; }

  .r5 .back { left:18px; top:21px; width:88px; height:88px; background:#ede9fe; border-radius:16px; transform:rotate(3deg); }
  .r5 .face { left:18px; top:21px; width:84px; height:84px; border-radius:16px; }
  .r5 .topbar { left:31px; top:13px; width:58px; height:18px; border-radius:9px; background:#8b5cf6; }
  .r5 .eye.l { left:39px; top:55px; border-radius:5px; } .r5 .eye.r { right:39px; top:55px; border-radius:5px; }
  .r5 .mouth { left:47px; top:83px; width:26px; }
  .r5 .side.l { left:4px; top:50px; width:17px; height:52px; background:#c4b5fd; border-radius:8px; }
  .r5 .side.r { right:4px; top:50px; width:17px; height:52px; background:#c4b5fd; border-radius:8px; }
  .r5 .bar { left:40px; bottom:9px; width:40px; background:#22d3ee; }

  .r6 .back { left:11px; top:36px; width:98px; height:68px; background:#bae6fd; border-radius:18px; }
  .r6 .face { left:15px; top:28px; width:90px; height:76px; border-radius:18px; }
  .r6 .visor { left:24px; top:48px; width:72px; height:34px; border-radius:12px; }
  .r6 .mini-eye.l { left:43px; top:59px; } .r6 .mini-eye.r { right:43px; top:59px; }
  .r6 .mouth { left:49px; top:87px; width:22px; border-color:#8b5cf6; }
  .r6 .tab.l { left:19px; top:18px; width:24px; height:18px; border-radius:8px; background:#fbbf24; }
  .r6 .tab.r { right:19px; top:18px; width:24px; height:18px; border-radius:8px; background:#22d3ee; }
  .r6 .bar { left:35px; bottom:11px; width:50px; background:#8b5cf6; }

  .r7 .back { left:22px; top:18px; width:76px; height:92px; background:#22d3ee; border-radius:26px 14px 26px 14px; opacity:.35; }
  .r7 .face { left:18px; top:24px; width:86px; height:82px; border-radius:26px 14px 26px 14px; }
  .r7 .plate { left:30px; top:43px; width:60px; height:42px; border-radius:14px 8px 14px 8px; }
  .r7 .eye.l { left:43px; top:56px; width:10px; height:13px; background:#fff; } .r7 .eye.r { right:43px; top:56px; width:10px; height:13px; background:#fff; }
  .r7 .mouth { left:49px; top:85px; width:22px; border-color:#17142c; }
  .r7 .dot { left:26px; top:10px; } .r7 .bar { left:55px; top:11px; width:36px; background:#fbbf24; }

  .r8 .back { left:12px; top:28px; width:96px; height:78px; background:#d1fae5; border-radius:28px; }
  .r8 .face { left:22px; top:22px; width:76px; height:86px; border-radius:28px; }
  .r8 .visor { left:33px; top:48px; width:54px; height:32px; border-radius:18px; }
  .r8 .mini-eye.l { left:46px; top:58px; } .r8 .mini-eye.r { right:46px; top:58px; }
  .r8 .mouth { left:50px; top:87px; width:20px; border-color:#58cc02; }
  .r8 .side.l { left:8px; top:55px; width:20px; height:38px; background:#58cc02; border-radius:11px; }
  .r8 .side.r { right:8px; top:55px; width:20px; height:38px; background:#58cc02; border-radius:11px; }
  .r8 .bar { left:42px; top:13px; width:36px; background:#22d3ee; }

  @media (max-width:640px) {
    .abo-top { flex-direction:column; }
    .abo-grid { grid-template-columns:1fr; }
    .abo-stage { grid-template-columns:1fr; text-align:center; }
    .abo-bubble::before { left:50%; top:-10px; transform:translateX(-50%) rotate(135deg); }
    .abo-choose { justify-self:stretch; }
  }
</style>
</head>
<body>
<div class="abo-wrap">
  <div class="abo-top">
    <div>
      <h1 class="abo-title">阿波 Apo · 机器人头部候选</h1>
      <p class="abo-sub">重做版：只塑造头部；只用圆角矩形拼接、重叠和少量层级变化。目标是偏机器人、适合课程气泡开场、后续能直接移植到主站。</p>
    </div>
    <a class="abo-back" href="index.html">← Demo 库</a>
  </div>

  <div class="abo-pickbar">
    <span>当前选择：<b id="picked">还没选</b></span>
    <span>候选只比较头部语言，不含身体动作</span>
  </div>

  <div class="abo-grid" id="grid"></div>
</div>

<script>
var OPTIONS=[
  {id:'r1',name:'圆角盒头',tag:'主推',say:'我用几个小方块，把这件事拆开给你看。',fit:'亲和、机器人感足，适合主线。',risk:'需要继续细化表情。'},
  {id:'r2',name:'深色面罩',tag:'更科技',say:'先别急着猜，我们看信号怎么亮起来。',fit:'科技感强，适合进阶课。',risk:'深色面罩别做得太冷。'},
  {id:'r3',name:'分层芯片头',tag:'结构感',say:'里面不是魔法，是一层层数字在传。',fit:'层叠感明显，能呼应架构课。',risk:'颜色多时要压住复杂度。'},
  {id:'r4',name:'扫描面罩',tag:'动态强',say:'我扫到线索啦，这一块很关键。',fit:'适合看图、卷积、识别类。',risk:'动画要轻，不能抢正文。'},
  {id:'r5',name:'方形学习机',tag:'稳定',say:'错一点没关系，我会慢慢调准。',fit:'像学习设备，稳重但仍可爱。',risk:'外形偏普通。'},
  {id:'r6',name:'双标签头',tag:'课程感',say:'这一格是输入，那一格是答案。',fit:'矩形拼接清楚，适合讲流程。',risk:'头顶标签需避免像按钮。'},
  {id:'r7',name:'斜切模块头',tag:'个性',say:'我不是圆滚滚玩具，我是小小 AI 模块。',fit:'识别度高，偏机器人。',risk:'亲和力稍弱。'},
  {id:'r8',name:'绿色助教头',tag:'暖反馈',say:'答错也没关系，我给你一个新线索。',fit:'适合鼓励、反馈场景。',risk:'绿色面积大时要防像医疗图标。'}
];

function getStore(k){try{return localStorage.getItem(k)||'';}catch(e){return '';}}
function setStore(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function bot(cls){
  return '<div class="bot '+cls+'">'+
    '<i class="back"></i><i class="face layer"></i><i class="plate"></i><i class="visor"></i>'+
    '<i class="eye l"></i><i class="eye r"></i><i class="mini-eye l"></i><i class="mini-eye r"></i>'+
    '<i class="mouth"></i><i class="dot"></i><i class="bar"></i><i class="scan"></i>'+
    '<i class="side l"></i><i class="side r"></i><i class="topbar"></i><i class="chip"></i><i class="tab l"></i><i class="tab r"></i>'+
  '</div>';
}
var picked=getStore('apo-rect-head-pick');
var grid=document.getElementById('grid');
var pickedEl=document.getElementById('picked');
function render(){
  var current=OPTIONS.find(function(o){return o.id===picked;});
  if(picked&&!current) picked='';
  pickedEl.textContent=current?current.name:'还没选';
  grid.innerHTML='';
  OPTIONS.forEach(function(o){
    var card=document.createElement('div');
    card.className='abo-card'+(picked===o.id?' is-picked':'');
    card.innerHTML='<div class="abo-stage">'+bot(o.id)+'<div class="abo-bubble"><b>阿波：</b>'+o.say+'</div></div>'+
      '<div class="abo-meta"><div class="abo-name">'+o.name+' <span class="abo-tag">'+o.tag+'</span></div>'+
      '<div class="abo-notes"><span>适合：'+o.fit+'</span><span>风险：'+o.risk+'</span></div>'+
      '<button class="abo-choose" type="button">选这个方向</button></div>';
    card.querySelector('.abo-choose').onclick=function(){
      picked=o.id;
      setStore('apo-rect-head-pick',picked);
      render();
    };
    grid.appendChild(card);
  });
}
render();
</script>
</body>
</html>
