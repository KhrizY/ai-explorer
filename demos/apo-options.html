  :root { color-scheme:light; }

  .abo-back { flex:none; display:inline-flex; align-items:center; height:38px; padding:0 14px; border-radius:12px; text-decoration:none;
    background:#fff; color:var(--violet-d); border:1.5px solid var(--line); font-weight:900; font-size:13px; box-shadow:0 3px 0 #dfe4ef; }
  .abo-pickbar { margin:12px 0 18px; padding:10px 12px; border-radius:14px; background:#fff; border:1.5px solid var(--line);

  .abo-pickbar b { color:var(--violet-d); }

  .expr-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }

  .expr-card:hover { transform:translateY(-3px); box-shadow:0 8px 0 #dfe4ef,0 16px 28px rgba(60,50,110,.11); }
  .expr-card:active { transform:translateY(2px); box-shadow:0 2px 0 #dfe4ef; }
  .expr-card.on { border-color:var(--violet-l); box-shadow:0 5px 0 var(--violet-d),0 14px 26px rgba(139,92,246,.18); }

  @keyframes antenna { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes visorTalk { 0%,100%{transform:translateY(0) scaleY(1)} 22%{transform:translateY(-2px) scaleY(.92)} 45%{transform:translateY(2px) scaleY(1.06)} 68%{transform:translateY(-1px) scaleY(.96)} }
  @keyframes eyesHappy { 0%,100%{height:13px; transform:translateY(0)} 50%{height:8px; transform:translateY(3px)} }
  @keyframes botNod { 0%,100%{transform:translateY(2px) rotate(0)} 35%{transform:translateY(6px) rotate(1deg)} 70%{transform:translateY(-3px) rotate(-1deg)} }
  @keyframes botThink { 0%,100%{transform:translateY(1px) rotate(-2deg)} 50%{transform:translateY(-4px) rotate(2deg)} }

  @keyframes successGlow { 0%,100%{box-shadow:0 0 0 rgba(88,204,2,0)} 50%{box-shadow:0 0 20px rgba(88,204,2,.55)} }
  @keyframes callPop { 0%{transform:scale(1.18) translateY(7px)} 45%{transform:scale(1.42) translateY(-4px)} 100%{transform:scale(1.34) translateY(0)} }

  .r9 .dot { left:55px; top:4px; }
  .r9 .shine { display:block; left:28px; top:32px; }
  .r9 .emoji-eye.l { display:block; left:38px; top:56px; }
  .r9 .emoji-eye.r { display:block; right:38px; top:56px; }
  .r9 .bolt.a { left:25px; top:41px; background:#c4b5fd; }
  .r9 .bolt.b { right:25px; top:41px; background:#c4b5fd; }
  .r9 .stub.a { display:block; left:33px; bottom:15px; }
  .r9 .stub.b { display:block; right:33px; bottom:15px; background:#22d3ee; }
  .r9 .panel.p1 { left:38px; bottom:7px; width:44px; background:#d8d5f2; }

  .r9 .visor,.r9 .eye,.r9 .mini-eye,.r9 .bar,.r9 .scan,.r9 .plate,.r9 .chip,.r9 .tab,.r9 .cheek,.r9 .panel.p2,.r9 .mouth { display:none; }
  @media (max-width:640px) {
    .abo-top { flex-direction:column; }
    .abo-grid { grid-template-columns:1fr; }
    .expr-lab { grid-template-columns:1fr; }
    .abo-stage { grid-template-columns:1fr; text-align:center; }
    .abo-bubble::before { left:50%; top:-10px; transform:translateX(-50%) rotate(135deg); }
    .abo-choose { justify-self:stretch; }
  }
</style>
</head>
<body>
<div class="abo-wrap">
  <div class="abo-top">
    <div>
      <h1 class="abo-title">阿波 Apo · 机器人头部候选</h1>
      <p class="abo-sub">深色面罩方向细化版：参考机器人 emoji 的方圆头、天线、侧耳、面屏、圆眼和面板线，但仍只用圆角矩形拼接与重叠实现。</p>
    </div>
    <a class="abo-back" href="index.html">← Demo 库</a>
  </div>

  <div class="abo-pickbar">
    <span>当前选择：<b id="picked">还没选</b></span>
    <span>候选只比较机器人头部语言，不含身体动作</span>
  </div>

  <div class="abo-grid" id="grid"></div>

  <section class="abo-section">
    <h2>宽屏面罩头 · 表情动画库</h2>
    <p>点击下面任意状态，左侧大预览会切换表情。后期接入课程时可按事件直接切换这些 class；说话不用嘴巴，只让面罩上下轻动。</p>
    <div class="expr-lab">
      <div class="expr-preview">
        <div class="expr-preview-stage" id="exprPreview"></div>
        <div class="expr-readout" id="exprReadout"></div>
      </div>
      <div class="expr-grid" id="exprGrid"></div>
    </div>
  </section>
</div>

<script>
var OPTIONS=[
  {id:'r1',name:'经典面罩头',tag:'主推',say:'我亮一下眼睛，咱们一步步拆开看。',fit:'最接近机器人 emoji，亲和和科技感平衡。',risk:'后续要调表情避免太呆。'},
  {id:'r2',name:'宽屏面罩头',tag:'更科技',say:'先别急着猜，我们看信号怎么亮起来。',fit:'深色面屏突出，适合主站阿波。',risk:'面罩太宽时会偏冷。'},
  {id:'r3',name:'芯片天线头',tag:'细节多',say:'我头顶的小灯亮了，说明线索接上啦。',fit:'天线、螺丝、面板线都更完整。',risk:'小尺寸下要保留大形。'},
  {id:'r4',name:'扫描面罩头',tag:'动态强',say:'我扫到线索啦，这一块很关键。',fit:'适合看图、识别、搜索类课程。',risk:'扫描线不能抢正文注意力。'},
  {id:'r5',name:'圆角学习机',tag:'稳定',say:'错一点没关系，我会慢慢调准。',fit:'像学习设备，适合主线课程长期陪伴。',risk:'外形偏稳，灵动感靠动效补。'},
  {id:'r6',name:'双耳助教头',tag:'可爱',say:'左边听输入，右边看答案，我来帮你对齐。',fit:'侧耳明显，机器人识别度强。',risk:'侧耳别像耳机广告。'},
  {id:'r7',name:'模块工程头',tag:'进阶课',say:'我不是魔法盒，是一块块模块拼起来的。',fit:'结构感强，适合拓展课。',risk:'亲和力稍弱。'},
  {id:'r8',name:'绿灯反馈头',tag:'鼓励',say:'答错也没关系，我给你一个新线索。',fit:'反馈场景友好，绿色状态灯清楚。',risk:'绿色面积要控制。'},
  {id:'r9',name:'Emoji 复刻头',tag:'复刻🤖',say:'你好呀！我是阿波，准备好一起探险了吗？',fit:'直接复刻 🤖 emoji：方圆头、深色圆眼、天线灯、侧耳，无面罩。',risk:'太接近 emoji，辨识度要靠配色微调。'}
];
var EXPRESSIONS=[
  {id:'expr-talk',name:'说话',use:'开场气泡逐字出现时使用',line:'面罩上下轻动，像声音从面屏里冒出来。'},
  {id:'expr-listen',name:'倾听',use:'等待孩子点击/选择时使用',line:'侧耳发光，表示阿波正在等输入。'},
  {id:'expr-happy',name:'开心',use:'答对、通关、小奖励',line:'眼灯压低变弯，保留无嘴表情。'},
  {id:'expr-think',name:'思考',use:'计算中、正在判断',line:'头部轻微摆动，顶部状态条变成思考色。'},
  {id:'expr-surprise',name:'惊讶',use:'发现反直觉现象',line:'面罩放大，眼灯撑开，表示“咦？”'},
  {id:'expr-success',name:'完成',use:'训练完成、任务达标',line:'绿色状态灯和侧耳亮起，给明确正反馈。'},
  {id:'expr-warn',name:'提醒',use:'温和错误反馈，不用红叉',line:'暖色状态条闪一下，保持鼓励语气。'},
  {id:'expr-sleep',name:'待机',use:'复习页或空闲状态',line:'眼灯收成短线，头部慢慢点动。'},
  {id:'expr-process',name:'扫描',use:'识别、检索、看图类交互',line:'面罩内扫描线移动，表示正在看/查/处理。'}
];

function getStore(k){try{return localStorage.getItem(k)||'';}catch(e){return '';}}
function setStore(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function bot(cls){
  return '<div class="bot '+cls+'">'+
    '<i class="back"></i><i class="face layer"></i><i class="plate"></i><i class="visor"></i>'+
    '<i class="eye l"></i><i class="eye r"></i><i class="mini-eye l"></i><i class="mini-eye r"></i>'+
    '<i class="mouth"></i><i class="dot"></i><i class="bar"></i><i class="scan"></i>'+
    '<i class="side l"></i><i class="side r"></i><i class="topbar"></i><i class="chip"></i><i class="tab l"></i><i class="tab r"></i>'+
    '<i class="bolt a"></i><i class="bolt b"></i><i class="panel p1"></i><i class="panel p2"></i><i class="cheek l"></i><i class="cheek r"></i><i class="emoji-eye l"></i><i class="emoji-eye r"></i><i class="stub a"></i><i class="stub b"></i><i class="shine"></i>'+
  '</div>';
}
var picked=getStore('apo-rect-head-pick');
var exprPicked='expr-talk';
var grid=document.getElementById('grid');
var exprGrid=document.getElementById('exprGrid');
var exprPreview=document.getElementById('exprPreview');
var exprReadout=document.getElementById('exprReadout');
var pickedEl=document.getElementById('picked');
function render(){
  var current=OPTIONS.find(function(o){return o.id===picked;});
  if(picked&&!current) picked='';
  pickedEl.textContent=current?current.name:'还没选';
  grid.innerHTML='';
  OPTIONS.forEach(function(o){
    var card=document.createElement('div');
    card.className='abo-card'+(picked===o.id?' is-picked':'');
    card.innerHTML='<div class="abo-stage">'+bot(o.id)+'<div class="abo-bubble"><b>阿波：</b>'+o.say+'</div></div>'+
      '<div class="abo-meta"><div class="abo-name">'+o.name+' <span class="abo-tag">'+o.tag+'</span></div>'+
      '<div class="abo-notes"><span>适合：'+o.fit+'</span><span>风险：'+o.risk+'</span></div>'+
      '<button class="abo-choose" type="button">选这个方向</button></div>';
    card.querySelector('.abo-choose').onclick=function(){
      picked=o.id;
      setStore('apo-rect-head-pick',picked);
      render();
    };
    grid.appendChild(card);
  });
}
render();
function renderExpressions(){
  exprGrid.innerHTML='';
  EXPRESSIONS.forEach(function(o){
    var card=document.createElement('button');
    card.type='button';
    card.className='expr-card'+(exprPicked===o.id?' on':'');
    card.innerHTML='<div class="expr-stage">'+bot('r2 '+o.id)+'</div><div class="expr-name">'+o.name+'</div><div class="expr-use">'+o.use+'</div>';
    card.onclick=function(){setExpression(o.id);};
    exprGrid.appendChild(card);
  });
  renderExpressionPreview();
}
function renderExpressionPreview(){
  var o=EXPRESSIONS.find(function(x){return x.id===exprPicked;})||EXPRESSIONS[0];
  exprPreview.innerHTML=bot('r2 '+o.id);
  exprReadout.innerHTML='<b>'+o.name+'</b>'+o.line+'<br>'+o.use;
  var b=exprPreview.querySelector('.bot');
  b.classList.remove('pop');
  void b.offsetWidth;
  b.classList.add('pop');
}
function setExpression(id){
  exprPicked=id;
  renderExpressions();
}
renderExpressions();
</script>
</body>
</html>
