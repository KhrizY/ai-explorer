<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进阶课程 UX 重做原型台</title>
<link rel="stylesheet" href="ui-system.css">
<style>
  :root{color-scheme:light}
  *{box-sizing:border-box;user-select:none;-webkit-user-select:none}
  body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--paper),var(--paper-2));font-family:var(--font);color:var(--ink)}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 14px 80px}
  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px}
  h1{margin:0 0 5px;font-size:24px;line-height:1.2;font-weight:900;color:var(--ink)}
  .sub{margin:0;color:var(--ink-dim);font-size:13px;line-height:1.65;font-weight:750;max-width:850px}
  .back{height:38px;padding:0 14px;border-radius:12px;background:#fff;color:var(--violet-d);border:1.5px solid var(--line);box-shadow:0 3px 0 #dfe4ef;text-decoration:none;font-size:13px;font-weight:900;display:inline-flex;align-items:center;flex:none}
  .tabs{display:flex;gap:9px;overflow-x:auto;padding:5px 1px 13px;scrollbar-width:thin;scroll-snap-type:x proximity}
  .tabs::-webkit-scrollbar{height:6px}.tabs::-webkit-scrollbar-thumb{background:#d8d5f2;border-radius:999px}
  .tab{flex:none;scroll-snap-align:start;border:2px solid var(--line);background:#fff;color:var(--ink-2);border-radius:999px;padding:9px 14px;font:900 12.5px/1 var(--font);cursor:pointer;white-space:nowrap;box-shadow:0 3px 0 #dfe4ef;touch-action:manipulation}
  .tab.on{color:#fff;border-color:transparent;background:linear-gradient(90deg,var(--violet),var(--cyan));box-shadow:0 4px 0 var(--violet-dd),0 10px 20px rgba(139,92,246,.2)}
  .proto-card{width:100%;max-width:none;background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 7px 0 #dfe4ef,0 16px 30px rgba(60,50,110,.08)}
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:2px 2px 14px}
  .title{margin:0;font-size:20px;font-weight:900;color:var(--ink)}
  .note{margin:5px 0 0;color:var(--ink-dim);font-size:12.5px;line-height:1.55;font-weight:750}
  .pill{flex:none;padding:5px 10px;border-radius:999px;background:#ecfeff;color:#0891b2;border:1px solid #bae6fd;font-size:12px;font-weight:900}
  .stage{position:relative;min-height:450px;border:1.5px solid var(--line);border-radius:18px;background:linear-gradient(160deg,#faf8ff,#eef1fb);padding:16px;overflow:hidden}
  .stage-inner{min-height:416px;border:1.5px solid var(--line);border-radius:16px;background:#fff;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden}
  .btn{appearance:none;border:none;cursor:pointer;border-radius:12px;padding:10px 16px;background:var(--correct);color:#fff;font:900 13px/1 var(--font);box-shadow:0 4px 0 var(--correct-d);touch-action:manipulation}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--correct-d)}
  .btn.v{background:linear-gradient(90deg,var(--violet),var(--cyan));box-shadow:0 4px 0 var(--violet-dd)}
  .btn.ghost{background:#fff;color:var(--violet-d);border:1.5px solid var(--line);box-shadow:0 3px 0 #dfe4ef}
  .row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;align-items:center}
  .grid{display:grid;gap:8px}
  .msg{min-height:20px;color:var(--ink-2);font-size:12.5px;line-height:1.55;font-weight:850;text-align:center}
  .small{color:var(--ink-dim);font-size:11.5px;line-height:1.45;font-weight:800}
  .chip{padding:7px 10px;border-radius:11px;background:#fff;border:1.5px solid var(--line);box-shadow:0 3px 0 #dfe4ef;color:var(--ink-2);font-size:12px;font-weight:900}
  .chip.on{background:#dcfce7;border-color:var(--correct);color:#15803d;box-shadow:0 3px 0 var(--correct-d)}
  .chip.v{background:#ede9fe;border-color:#c4b5fd;color:var(--violet-d)}
  .meter{height:12px;border-radius:999px;background:#e6e9f2;overflow:hidden}
  .meter i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--violet),var(--cyan),var(--correct));transition:width .2s}
  .range{width:100%;accent-color:var(--violet)}
  .svg{width:100%;max-width:760px;height:260px;overflow:visible}
  .node{fill:#fff;stroke:#c4b5fd;stroke-width:2}
  .node.on{fill:#f5f3ff;stroke:#8b5cf6}
  .wire{fill:none;stroke:#c4b5fd;stroke-width:3;stroke-linecap:round}
  .wire.live{stroke:#22d3ee;stroke-dasharray:8 8;animation:dash 1s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-32}}
  .txt{font:900 10px var(--font);fill:#4b4869;text-anchor:middle}
  .tiny{font:800 8px var(--font);fill:#8b90a6;text-anchor:middle}
  .nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .soft-panel{display:grid;grid-template-columns:90px minmax(190px,1fr) minmax(190px,1fr);gap:14px;width:100%;align-items:center}
  .barline{display:grid;grid-template-columns:58px 1fr 42px;gap:8px;align-items:center;font-size:12px;font-weight:900;color:var(--ink-2)}
  .matrix{display:grid;grid-template-columns:repeat(6,38px);gap:5px;justify-content:center}
  .cell{width:38px;height:38px;border-radius:11px;background:#fff;border:1.5px solid #d9d6f2;box-shadow:0 3px 0 #dfe4ef;display:grid;place-items:center;font-size:12px;font-weight:900;color:var(--ink-2)}
  .cell.allow{background:#ccfbf1;border-color:#2dd4bf;color:#0f766e}
  .cell.lock{background:#f1f5f9;color:#94a3b8}
  .heat{display:grid;grid-template-columns:repeat(5,42px);gap:6px;justify-content:center}
  .heat .cell{width:42px;height:42px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;align-items:stretch}
  .panel{background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:12px;box-shadow:0 4px 0 #dfe4ef}
  .panel h3{margin:0 0 8px;font-size:14px;color:var(--ink);font-weight:900}
  .data-pool{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:8px;width:100%}
  .data-card{border:1.5px solid var(--line);border-radius:13px;background:#fff;padding:8px;cursor:pointer;text-align:center;box-shadow:0 3px 0 #dfe4ef;font-weight:900;color:var(--ink-2);font-size:12px}
  .data-card.on{background:#f5f3ff;border-color:#8b5cf6;color:#6d28d9}
  .radar{position:relative;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,#fff 0 25%,#f5f3ff 26% 55%,#ecfeff 56% 100%);border:1.5px solid var(--line)}
  .radar .center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:76px;height:76px;border-radius:24px;background:linear-gradient(135deg,var(--violet),var(--cyan));display:grid;place-items:center;color:#fff;font-size:30px;box-shadow:0 5px 0 var(--violet-dd);font-weight:900}
  .radar button{position:absolute;width:72px;height:54px;border:none;border-radius:16px;background:#fff;border:1.5px solid #c4b5fd;color:#6d28d9;font-weight:900;box-shadow:0 3px 0 #dfe4ef;cursor:pointer}
  .scan-scene{display:grid;grid-template-columns:repeat(3,96px);gap:9px;justify-content:center}
  .thing{height:76px;border-radius:16px;background:#fff;border:1.5px solid var(--line);box-shadow:0 3px 0 #dfe4ef;display:grid;place-items:center;cursor:pointer;font-size:26px;font-weight:900}
  .thing.on{background:#ecfeff;border-color:#22d3ee}
  .agi-matrix{display:grid;grid-template-columns:82px repeat(5,64px);gap:6px;align-items:center}
  .agi-matrix div{min-height:36px;border-radius:10px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;text-align:center;font-size:11px;font-weight:900;color:var(--ink-2);padding:4px}
  .agi-matrix .m-on{background:#dcfce7;border-color:#58cc02;color:#15803d}
  .console{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
  .box{min-height:86px;border-radius:15px;background:#fff;border:1.5px solid var(--line);box-shadow:0 3px 0 #dfe4ef;padding:10px;text-align:center;color:var(--ink-2);font-size:12px;font-weight:850}
  .box.on{background:#f5f3ff;border-color:#8b5cf6;color:#6d28d9}
  .pipe{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;width:100%}
  .pipe .box{min-width:104px}
  .prompt-area{display:grid;grid-template-columns:180px 1fr 170px;gap:12px;width:100%}
  .prompt-box{min-height:210px;border-radius:15px;border:1.5px solid #c4b5fd;background:#faf8ff;padding:10px;display:flex;flex-direction:column;gap:7px}
  @media(max-width:800px){.soft-panel,.split,.prompt-area{grid-template-columns:1fr}.console{grid-template-columns:1fr 1fr}.stage-inner{justify-content:flex-start}.svg{height:220px}.agi-matrix{grid-template-columns:70px repeat(5,48px)}}
  @media(max-width:520px){.wrap{padding:18px 10px 70px}.top{flex-direction:column}.stage{padding:10px}.stage-inner{min-height:430px;padding:12px}.matrix{grid-template-columns:repeat(6,32px)}.cell{width:32px;height:32px}.heat{grid-template-columns:repeat(5,34px)}.heat .cell{width:34px;height:34px}.scan-scene{grid-template-columns:repeat(2,92px)}.radar{width:245px;height:245px}.console{grid-template-columns:1fr}.agi-matrix{grid-template-columns:58px repeat(5,42px);gap:4px}.agi-matrix div{font-size:9px;min-height:32px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>进阶课程 UX 重做原型台</h1>
      <p class="sub">按 `ux-component-redesign-spec.md` 重做。每个 tab 是一个独立 HTML 互动/动画原型，目标是让知识点机制本身可见，而不是复用小游戏外壳。</p>
    </div>
    <a class="back" href="index.html">返回 Demo 库</a>
  </div>
  <div class="tabs" id="tabs"></div>
  <section class="proto-card">
    <div class="head">
      <div><h2 class="title" id="title"></h2><p class="note" id="note"></p></div>
      <span class="pill" id="kind"></span>
    </div>
    <div class="stage"><div class="stage-inner" id="stage"></div></div>
  </section>
  <div class="nav"><button class="btn ghost" id="prev">← 上一个</button><button class="btn v" id="next">下一个 →</button></div>
</div>
<script>
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t}return a}
function bar(v){return '<div class="meter"><i style="width:'+clamp(v,0,100)+'%"></i></div>'}
function fmt(n){return Math.round(n)}
var timers=[];function clearTimers(){timers.forEach(clearInterval);timers=[]}
function setTimer(fn,t){var id=setInterval(fn,t);timers.push(id);return id}

var DEMOS=[
 {id:'grad',t:'RNN S3 · 梯度消失',k:'机制动画',n:'错误信号从后往前传，越传越弱；门控模式能缓解长期信息丢失。',m:uxGradientFadeTunnel},
 {id:'softmax',t:'注意力 S2 · softmax 权重',k:'数学交互',n:'把点积分数变成总和 100% 的权重，再按权重混合 Value。',m:uxSoftmaxScale},
 {id:'heads',t:'注意力 S3 · 多头透镜',k:'关系导图',n:'不同注意力头捕捉不同关系，合并后得到更丰富的句子理解。',m:uxMultiHeadLens},
 {id:'pos',t:'Transformer S1 · 位置编码',k:'对照实验',n:'并行看全句会丢顺序，位置编码把“第几个”写进 token。',m:uxPositionCodeLab},
 {id:'block',t:'Transformer S2 · Block 工厂',k:'架构流线',n:'一层 block 先交换信息，再保留旁路、归一化、逐 token 加工。',m:uxTransformerBlockFactory},
 {id:'mask',t:'Transformer S3 · 因果遮罩',k:'动态矩阵',n:'自回归生成只能看过去，不能看未来；mask 决定每个位置能看谁。',m:uxCausalMaskBoard},
 {id:'bitter',t:'大模型 S1 · 苦涩教训',k:'曲线动画',n:'手写规则短期聪明，通用学习随算力增长长期超过它。',m:uxBitterLessonRace},
 {id:'scale',t:'大模型 S2 · 规模控制台',k:'参数控制台',n:'数据、参数、算力必须配平；只堆一个数字会浪费。',m:uxScalingConsole},
 {id:'value',t:'强化学习 S3 · 价值函数',k:'热力图传播',n:'状态价值是未来奖励的估计，会从目标奖励向前回传。',m:uxValueHeatmap},
 {id:'data',t:'机器学习 S4 · 数据诊断台',k:'诊断交互',n:'数据质量分成标签干净度、多样性和噪声比例，不只是好/坏。',m:uxDataClinic},
 {id:'radar',t:'AI 大观 S1 · 能力雷达',k:'总览导图',n:'AI 不是魔法，而是看、学、说、做四类计算能力拼起来。',m:uxAICapabilityRadar},
 {id:'scanner',t:'AI 大观 S2 · 系统扫描',k:'流程剖面',n:'是不是 AI 要看内部是否有模型预测/生成/推荐，而不是看外壳。',m:uxAISystemScanner},
 {id:'agi',t:'AGI S1 · 能力迁移矩阵',k:'能力矩阵',n:'AGI 不只是会聊天，而是跨任务迁移、执行和可靠性都要过关。',m:uxAGIMatrix},
 {id:'react',t:'Agent S2 · ReAct 控制台',k:'状态机',n:'Observation 写回上下文，改变下一轮 Thought。',m:uxReActConsole},
 {id:'rag',t:'Agent S3 · RAG 管道',k:'管道动画',n:'资料切块、向量化、相似检索，再塞进上下文槽。',m:uxRAGPipeline},
 {id:'api',t:'上手 AI S1 · API 请求包',k:'请求流线',n:'一次调用是结构化请求包从前端经后端到模型服务，再返回响应。',m:uxAPIRequestTrip},
 {id:'key',t:'上手 AI S2 · Key 泄漏模拟',k:'安全架构',n:'Key 放前端会暴露；正确方式是后端代理。',m:uxKeyLeakSimulator},
 {id:'prompt',t:'上手 AI S3 · Prompt 搭建器',k:'积木搭建',n:'目标、资料、格式、限制、示例共同决定输出稳定度。',m:uxPromptBuilder}
];
var cur=0, tabs=document.getElementById('tabs'), stage=document.getElementById('stage');
DEMOS.forEach(function(d,i){var b=el('button','tab'+(i?'':' on'),d.t);b.type='button';b.onclick=function(){show(i)};tabs.appendChild(b)});
document.getElementById('prev').onclick=function(){show(cur-1)};
document.getElementById('next').onclick=function(){show(cur+1)};
function show(i){clearTimers();cur=(i+DEMOS.length)%DEMOS.length;Array.from(tabs.children).forEach(function(b,k){b.classList.toggle('on',k===cur)});tabs.children[cur].scrollIntoView({inline:'center',block:'nearest'});var d=DEMOS[cur];document.getElementById('title').textContent=d.t;document.getElementById('note').textContent=d.n;document.getElementById('kind').textContent=d.k;stage.innerHTML='';d.m(stage)}

function uxGradientFadeTunnel(s){
 var words=['小猫','昨天','在','沙发','睡觉'], row=el('div','row'), nums=el('div','row'), msg=el('div','msg','点击一种模式，看错误信号怎样从后往前传。');
 words.forEach(function(w){row.appendChild(el('div','chip',w))}); words.forEach(function(){nums.appendChild(el('div','chip v','0.00'))});
 var ball=el('div');ball.style.cssText='width:34px;height:34px;border-radius:50%;background:#22d3ee;box-shadow:0 0 18px rgba(34,211,238,.6);transition:.28s;position:relative';
 var lane=el('div');lane.style.cssText='width:100%;max-width:520px;height:52px;border-radius:999px;background:#eef2ff;display:flex;align-items:center;justify-content:flex-end;padding:9px';lane.appendChild(ball);
 function run(mode){var vals=mode==='gate'?[.62,.72,.82,.92,1]:[.09,.21,.38,.62,1],i=4;msg.textContent=mode==='gate'?'门控模式：信号保留得更久':'普通 RNN：越往前信号越弱';Array.from(nums.children).forEach(function(n,k){n.textContent='0.00';n.classList.remove('on')});var id=setTimer(function(){var left=(4-i)*25;ball.style.transform='translateX(-'+left+'%) scale('+(.45+vals[i]*.65)+')';ball.style.opacity=.25+vals[i]*.75;nums.children[i].textContent=vals[i].toFixed(2);nums.children[i].classList.add('on');i--;if(i<0)clearInterval(id)},420)}
 s.appendChild(row);s.appendChild(lane);s.appendChild(nums);s.appendChild(el('div','row',''));var buttons=s.lastChild;var a=el('button','btn v','普通 RNN');a.onclick=function(){run('plain')};var b=el('button','btn','门控模式');b.onclick=function(){run('gate')};buttons.append(a,b);s.appendChild(msg)
}
function uxSoftmaxScale(s){
 var scores=[-1.1,2.4,.8,1.6], names=['在','沙发','上','睡觉'], temp=1, bars=el('div'), weights=el('div'), msg=el('div','msg');
 function soft(){var ex=scores.map(function(x){return Math.exp(x/temp)}),sum=ex.reduce((a,b)=>a+b,0);return ex.map(x=>x/sum*100)}
 function draw(){bars.innerHTML='';weights.innerHTML='';var w=soft();names.forEach(function(n,i){var line=el('div','barline','<span>'+n+'</span>'+bar((scores[i]+2)/5*100)+'<span>'+scores[i].toFixed(1)+'</span>');var r=el('input');r.type='range';r.min=-2;r.max=3;r.step=.1;r.value=scores[i];r.className='range';r.oninput=function(){scores[i]=+r.value;draw()};bars.append(line,r);weights.appendChild(el('div','barline','<span>'+n+'</span>'+bar(w[i])+'<span>'+fmt(w[i])+'%</span>'))});msg.textContent='softmax 后权重总和 = '+fmt(w.reduce((a,b)=>a+b,0))+'%。Value 按这些比例混合。'}
 var tempR=el('input');tempR.type='range';tempR.min=.4;tempR.max=2;tempR.step=.1;tempR.value=1;tempR.className='range';tempR.oninput=function(){temp=+tempR.value;draw()};
 s.appendChild(el('div','soft-panel','<div class="chip on">Query<br>小猫</div><div><b>点积分数</b></div><div><b>softmax 权重</b></div>'));s.lastChild.children[1].appendChild(bars);s.lastChild.children[2].appendChild(weights);s.appendChild(el('div','small','温度：'));s.appendChild(tempR);s.appendChild(msg);draw()
}
function uxMultiHeadLens(s){
 var words=['小猫','在','沙发','上','睡觉'], heads=[['语法头','#8b5cf6',[0,4]],['位置头','#22d3ee',[2,3]],['动作头','#58cc02',[4,0]],['场景头','#fbbf24',[0,2]]], svg=el('div'), msg=el('div','msg','点击不同头，看它关注哪种关系。');
 svg.innerHTML='<svg class="svg" viewBox="0 0 500 220" id="mh"></svg>';var root=svg.firstChild;
 function draw(which){root.innerHTML='';words.forEach(function(w,i){root.innerHTML+='<rect class="node" x="'+(55+i*92)+'" y="150" width="62" height="38" rx="12"/><text class="txt" x="'+(86+i*92)+'" y="174">'+w+'</text>'});heads.forEach(function(h,hi){if(which!==hi&&which!=='all')return;var a=86+h[2][0]*92,b=86+h[2][1]*92;root.innerHTML='<path d="M'+a+' 150 Q250 '+(35+hi*18)+' '+b+' 150" fill="none" stroke="'+h[1]+'" stroke-width="4" stroke-linecap="round" opacity=".85"/>'+root.innerHTML});}
 var row=el('div','row');heads.forEach(function(h,i){var b=el('button','btn ghost',h[0]);b.onclick=function(){draw(i);msg.textContent=h[0]+'：只看一种关系'};row.appendChild(b)});var all=el('button','btn v','合并多头');all.onclick=function(){draw('all');msg.textContent='多头合并：多种关系同时进入下一层'};row.appendChild(all);s.append(row,svg,msg);draw(0)
}
function uxPositionCodeLab(s){
 var bag=el('div','row'), msg=el('div','msg','先看无位置词袋：两句话的词一样，含义会混。'), on=false;
 function draw(){bag.innerHTML='';var rows=on?[['1:我','2:打','3:你','我打你'],['1:你','2:打','3:我','你打我']]:[['我','打','你','含义?'],['你','打','我','含义?']];rows.forEach(function(r){var p=el('div','panel');p.style.minWidth='230px';p.innerHTML='<h3>'+(on?'加位置编码':'无位置词袋')+'</h3>';r.forEach(function(x,i){var c=el('span','chip '+(on?'on':'v'),x);c.style.margin='4px';p.appendChild(c)});bag.appendChild(p)});msg.textContent=on?'位置条把“第几个”写进 token，两个句子分开了。':'没有位置时，并行模型只看到词集合，顺序信息丢失。'}
 var btn=el('button','btn v','切换位置编码');btn.onclick=function(){on=!on;draw()};s.append(bag,btn,msg);draw()
}
function uxTransformerBlockFactory(s){
 var step=0, svg=el('div'), msg=el('div','msg','走一步，看 token 穿过一个 Transformer Block。');

function uxValueHeatmap(s){
