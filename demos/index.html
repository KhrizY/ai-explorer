<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 探险号 · UX Demo 库（20+ 可玩原型）</title>
<link rel="stylesheet" href="ui-system.css">
<style>
  :root { color-scheme: light; }
  body { background:linear-gradient(180deg,var(--paper),var(--paper-2)); }
  .wrap { max-width:1080px; margin:0 auto; padding:24px 16px 90px; }
  h1 { font-size:24px; color:#1e1b3a; margin:0 0 4px; font-weight:900; }
  .sub { color:#6b7280; font-size:13px; margin-bottom:16px; line-height:1.65; }
  /* 可拖拽标签条 */
  .tabs { display:flex; gap:10px; overflow-x:auto; padding:6px 2px 12px; cursor:grab; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tabs.drag { cursor:grabbing; }
  .tab { flex:none; padding:9px 18px; border-radius:999px; background:#fff; border:2px solid #e6e9f2; font-weight:900;
    font-size:14px; color:#6b7280; cursor:pointer; white-space:nowrap; transition:all .15s; user-select:none; }
  .tab.on { background:linear-gradient(90deg,var(--violet),var(--violet-d)); color:#fff; border-color:transparent; box-shadow:0 4px 0 var(--violet-dd),0 8px 18px rgba(139,92,246,.28); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; margin-top:8px; }
  .demo { background:#fff; border:1.5px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 6px 0 #dfe4ef,0 14px 24px rgba(60,50,110,.08); }
  .demo-head { padding:12px 14px; display:flex; align-items:center; gap:8px; background:linear-gradient(135deg,#fef9ff,#eef1fb); border-bottom:1px solid #eceef5; color:#1e1b3a; }
  .demo-head .n { font-size:12px; font-weight:900; color:#fff; background:var(--violet); border-radius:8px; padding:2px 8px; box-shadow:0 2px 0 var(--violet-dd); }
  .demo-head b { font-size:14px; color:#1e1b3a !important; -webkit-text-fill-color:#1e1b3a; }
  .demo-head .cat { margin-left:auto; font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; }
  .cat-g { background:#dcfce7; color:#15803d !important; } .cat-v { background:#e0f2fe; color:#0369a1 !important; } .cat-e { background:#fef3c7; color:#92400e !important; }
  .demo-teach { font-size:11.5px; color:#4b4869; padding:6px 14px 0; font-weight:700; }
  .demo-stage { position:relative; margin:12px 14px 18px; background:linear-gradient(160deg,#faf8ff,#eef1fb); border:1.5px solid var(--line); border-radius:14px; min-height:200px; padding:16px; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#4b4869; }
  .demo-stage.light { background:linear-gradient(160deg,#faf8ff,#eef1fb); }
  .stg-btn { appearance:none; -webkit-appearance:none; font-family:var(--font); font-weight:900; border:none; cursor:pointer; border-radius:12px; padding:10px 22px; font-size:14px;
    background:#58cc02 !important; color:#fff !important; box-shadow:0 4px 0 #46a302; margin-top:10px; -webkit-text-fill-color:#fff; text-shadow:0 1px 0 rgba(0,0,0,.18); }
  .stg-btn:active { transform:translateY(3px); box-shadow:0 1px 0 var(--correct-d); }
  .stg-btn.v { background:linear-gradient(90deg,var(--violet-l),var(--cyan)) !important; color:#08122e !important; box-shadow:0 4px 0 #6d28d9; -webkit-text-fill-color:#08122e; text-shadow:none; }
  .stg-msg { color:#4b4869; font-size:12.5px; text-align:center; min-height:18px; margin-top:8px; font-weight:700; }
  .demo-stage.light .stg-msg { color:#4b4869; }
  .demo-stage:not(.light) { color:#4b4869; }
  .demo-stage:not(.light) .stg-msg,
  .demo-stage:not(.light) .noise-step,
  .demo-stage:not(.light) .trail-top,
  .demo-stage:not(.light) .trail-legend { color:#4b4869 !important; -webkit-text-fill-color:#4b4869; }
  .demo-stage:not(.light) .stg-msg b { color:#6d28d9 !important; -webkit-text-fill-color:#6d28d9; }
  .demo-stage .reset-btn { color:#6d28d9 !important; }
  @media (forced-colors: active) {
    .stg-btn, .stg-btn.v { forced-color-adjust:none; background:#58cc02 !important; color:#fff !important; -webkit-text-fill-color:#fff; border:2px solid #fff; }
  }
  .stg-score { position:absolute; top:8px; right:12px; color:#b45309; background:#fffbeb; border:1px solid #fde68a; border-radius:999px; padding:3px 9px; font-weight:900; font-size:12px; z-index:4; }
  /* 大反馈闪屏 */
  .bigflash { position:absolute; inset:0; display:grid; place-items:center; font-size:40px; font-weight:900; z-index:9; pointer-events:none;
    animation:bigF .7s ease-out forwards; }
  @keyframes bigF { 0%{opacity:0;transform:scale(.4)} 30%{opacity:1;transform:scale(1.1)} 70%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1)} }
  @keyframes shk { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 60%{transform:translateX(8px)} }
  .shake { animation:shk .35s ease; }
  .reset-btn { margin-left:8px; width:26px; height:26px; border-radius:8px; border:none; background:#ede9fe; color:#6d28d9; font-size:15px; font-weight:900; cursor:pointer; line-height:1; flex:none; }
  .reset-btn:hover { background:#ddd6fe; }
  .flowline { stroke:#c4b5fd; stroke-width:0.7; }
  .flowline.fire { stroke:#22d3ee; stroke-width:1.2; stroke-dasharray:4 4; animation:dashmove .5s linear infinite; }
  @keyframes dashmove { to { stroke-dashoffset:-8; } }
  .adv-note { margin:0 14px 12px; padding:8px 10px; border-radius:10px; background:#f5f3ff; color:#6d28d9; font-size:12px; font-weight:800; line-height:1.45; }
  .noise-lab { display:grid; grid-template-columns:auto 1fr; gap:14px; align-items:center; width:100%; max-width:440px; }
  .noise-canvas { width:178px; height:178px; border-radius:16px; image-rendering:pixelated; background:#eef1fb; box-shadow:0 0 0 3px #fff,0 8px 18px rgba(60,50,110,.12); }
  .noise-panel { display:grid; gap:9px; min-width:0; }
  .noise-step { display:flex; align-items:center; gap:8px; color:#4b4869; font-size:12px; font-weight:900; }
  .noise-step b { width:22px; height:22px; border-radius:8px; display:grid; place-items:center; background:#ede9fe; color:#6d28d9; flex:none; }
  .noise-step.on b { background:#58cc02; color:#fff; }
  .noise-meter { height:12px; border-radius:999px; background:#e6e9f2; overflow:hidden; }
  .noise-meter i { display:block; height:100%; width:100%; border-radius:999px; background:linear-gradient(90deg,#fb7185,#fbbf24); transition:width .25s; }
  .trail-top { display:flex; justify-content:space-between; gap:10px; align-items:center; width:100%; max-width:360px; margin-bottom:10px; color:#4b4869; font-size:12px; font-weight:900; }
  .trail-board { display:grid; grid-template-columns:repeat(5,48px); gap:7px; justify-content:center; }
  .trail-cell { width:48px; height:48px; border-radius:12px; background:#fff; border:2px solid #d9d6f2; color:#4b4869; display:grid; place-items:center; font-size:21px; font-weight:900; cursor:pointer; transition:transform .12s, background .12s, border-color .12s; box-shadow:0 3px 0 #dfe4ef; }
  .trail-cell:hover { transform:translateY(-2px); }
  .trail-cell.start { background:#ccfbf1; border-color:#2dd4bf; }
  .trail-cell.goal { background:#dcfce7; border-color:#58cc02; }
  .trail-cell.step { background:#dbeafe; border-color:#93c5fd; }
  .trail-cell.pit { background:#fef3c7; border-color:#fbbf24; }
  .trail-cell.lock { opacity:.42; cursor:default; }
  .trail-actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
  .trail-legend { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; color:#8b90a6; font-size:11px; font-weight:800; margin-top:8px; }
  @media (max-width:520px) {
    .noise-lab { grid-template-columns:1fr; justify-items:center; }
    .trail-board { grid-template-columns:repeat(5,40px); gap:6px; }
    .trail-cell { width:40px; height:40px; border-radius:10px; font-size:18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🧪 AI 探险号 · UX Demo 库</h1>
  <div class="sub">20 个可玩原型 · 三类：🎮游戏交互 / 🔬可视化讲解 / 🎚️探索模拟 · 标签条可左右拖动 · <a href="apo-options.html" style="color:#6d28d9;font-weight:900;text-decoration:none;border-bottom:2px dotted #eab308">阿波候选页</a> · <a href="advanced-ux-compare.html" style="color:#0891b2;font-weight:900;text-decoration:none;border-bottom:2px dotted #22d3ee">进阶UX对比台</a></div>
  <div class="tabs" id="tabs"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
// ============ 公共工具 ============
function spark(x,y){var E=['✨','⭐','🎉','💫','🌟'];for(var i=0;i<9;i++){var s=document.createElement('div');s.className='spark';s.textContent=E[i%5];s.style.left=x+'px';s.style.top=y+'px';var a=Math.PI*2*i/9;s.style.setProperty('--dx',Math.cos(a)*66+'px');s.style.setProperty('--dy',(Math.sin(a)*66-24)+'px');document.body.appendChild(s);(function(el){setTimeout(function(){el.remove();},900);})(s);}}
function bigFlash(stage, txt, ok){var f=document.createElement('div');f.className='bigflash';f.textContent=txt;f.style.color=ok?'#7CFC66':'#ffd166';stage.appendChild(f);stage.classList.add('shake');setTimeout(function(){f.remove();stage.classList.remove('shake');},700);if(ok){var r=stage.getBoundingClientRect();spark(r.left+r.width/2,r.top+r.height/2);}}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

// ============ Demo 注册表 ============
var DEMOS=[];
function demo(o){DEMOS.push(o);}

// ---------- 🎮 游戏交互 ----------
demo({id:'sort',cat:'g',title:'拖拽分拣',teach:'教「分类」——AI 最核心的动作',mount:function(s){
  var DATA=[{e:'🍎',a:1},{e:'🍅',a:0},{e:'🍏',a:1},{e:'🐱',a:0},{e:'🍊',a:0},{e:'🍎',a:1}];
  var score=0,sel=null; var sc=el('div','stg-score','0 分');s.appendChild(sc);
  var row=el('div');row.style.cssText='display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-height:56px;margin-bottom:14px';
  var bins=el('div');bins.style.cssText='display:flex;gap:12px;width:100%';
  function mk(){row.innerHTML='';DATA.forEach(function(f,i){var d=el('div',null,f.e);d.style.cssText='width:48px;height:48px;border-radius:12px;background:#fff;display:grid;place-items:center;font-size:28px;cursor:pointer;transition:transform .15s';d.onclick=function(){row.querySelectorAll('div').forEach(function(x){x.style.transform='';x.style.boxShadow='';});d.style.transform='scale(1.25) translateY(-6px)';d.style.boxShadow='0 0 0 3px #ffd66d';sel={el:d,i:i};};row.appendChild(d);});}
  [['🍎 苹果','1'],['🚫 不是','0']].forEach(function(b){var bn=el('div',null,b[0]);bn.style.cssText='flex:1;padding:14px;border-radius:12px;border:2.5px dashed #7c6fb0;color:#4b4869;text-align:center;font-weight:800;cursor:pointer';bn.onclick=function(e){if(!sel)return;var ok=(''+DATA[sel.i].a)===b[1];if(ok){score+=10;bigFlash(s,'对！✓',true);sel.el.style.transform='scale(0)';var d=sel.el;setTimeout(function(){d.remove();},250);}else{score=Math.max(0,score-5);bigFlash(s,'再想想～',false);}sc.textContent=score+' 分';sel=null;if(!row.querySelector('div'))setTimeout(mk,400);};bins.appendChild(bn);});
  s.appendChild(row);s.appendChild(bins);mk();
}});

demo({id:'crank',cat:'g',title:'手摇训练机',teach:'教「训练循环」——狂点看准确率爬升',mount:function(s){
  var acc=8,done=false;var face=el('div',null,'😵');face.style.cssText='font-size:52px;transition:transform .1s';
  var bar=el('div');bar.style.cssText='height:14px;width:240px;border-radius:9px;background:rgba(255,255,255,.12);overflow:hidden;margin:10px 0 6px';
  var fill=el('div');fill.style.cssText='height:100%;width:8%;border-radius:9px;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:width .25s';bar.appendChild(fill);
  var lbl=el('div','stg-msg','准确率 8% —— 全靠瞎猜…');
  var btn=el('button','stg-btn v','🔧 训练一下！');
  btn.onclick=function(e){acc+=(96-acc)*0.16+Math.random()*3;if(acc>98)acc=98;var v=Math.round(acc);fill.style.width=v+'%';face.textContent=v<25?'😵':v<55?'😐':v<85?'🙂':'😻';face.style.transform='scale('+(1+v/300)+')';lbl.textContent='准确率 '+v+'% —— '+(v<25?'瞎猜…':v<55?'有感觉了…':v<85?'越来越准！':'认猫高手！');if(v>=90&&!done){done=true;bigFlash(s,'🎉 训练成功!',true);}};
  s.appendChild(face);s.appendChild(bar);s.appendChild(lbl);s.appendChild(btn);
}});

demo({id:'qte',cat:'g',title:'计时判定 QTE',teach:'教「抓住时机」+ 明显成败反馈',mount:function(s){
  var combo=0,pos=0,dir=1,speed=1.1,zw=22,zx=50,run=true;
  var track=el('div');track.style.cssText='position:relative;height:32px;width:100%;max-width:360px;border-radius:9px;background:rgba(255,255,255,.1);overflow:hidden;margin:10px 0';
  var zone=el('div');zone.style.cssText='position:absolute;top:0;bottom:0;background:linear-gradient(var(--correct),var(--correct-d));opacity:.6';
  var ind=el('div');ind.style.cssText='position:absolute;top:-3px;width:6px;height:38px;background:#fff;border-radius:3px;box-shadow:0 0 8px #fff';
  track.appendChild(zone);track.appendChild(ind);
  var msg=el('div','stg-msg','连击 0');var btn=el('button','stg-btn','抓！');
  function place(){zx=12+Math.random()*(88-zw);zone.style.left=zx+'%';zone.style.width=zw+'%';}
  function loop(){if(run){pos+=dir*speed;if(pos>=100){pos=100;dir=-1;}if(pos<=0){pos=0;dir=1;}ind.style.left=pos+'%';}requestAnimationFrame(loop);}
  btn.onclick=function(){if(pos>=zx&&pos<=zx+zw){combo++;bigFlash(s,'🎯 命中!',true);speed+=0.22;zw=Math.max(9,zw-1.6);msg.textContent='连击 '+combo+' 🔥';place();}else{combo=0;speed=1.1;zw=22;bigFlash(s,'✗ 差一点!',false);msg.textContent='连击断了，再来！';place();}};
  s.appendChild(track);s.appendChild(msg);s.appendChild(btn);place();loop();
}});

demo({id:'fish',cat:'g',title:'长按滑条（钓鱼式）',teach:'教「平衡/调参」——用按钮把值稳在区间',mount:function(s){
  var H=180,barH=28,tgtH=48,barY=140,vy=0,hold=false,p=0,t=0,won=false;
  var wrap=el('div');wrap.style.cssText='display:flex;gap:12px;align-items:flex-start';
  var track=el('div');track.style.cssText='position:relative;width:70px;height:'+H+'px;border-radius:12px;background:linear-gradient(#e0f2fe,#f5f3ff);overflow:hidden;border:1.5px solid #d9d6f2;box-shadow:inset 0 0 0 2px #fff';
  var tgt=el('div',null,'<div style="text-align:center;font-size:24px;line-height:48px">🐟</div>');tgt.style.cssText='position:absolute;left:6px;right:6px;height:48px;border-radius:8px;background:rgba(88,204,2,.25);border:2px solid var(--correct)';
  var bar=el('div');bar.style.cssText='position:absolute;left:6px;right:6px;height:28px;border-radius:6px;background:rgba(167,139,250,.55);border:2px solid var(--violet-l)';
  track.appendChild(tgt);track.appendChild(bar);
  var prog=el('div');prog.style.cssText='width:12px;height:'+H+'px;border-radius:6px;background:#e6e9f2;overflow:hidden;position:relative';
  var pf=el('div');pf.style.cssText='position:absolute;bottom:0;left:0;right:0;height:0%;background:linear-gradient(var(--cyan),var(--correct))';prog.appendChild(pf);
  wrap.appendChild(track);wrap.appendChild(prog);
  var msg=el('div','stg-msg','按住下面的按钮收线');
  var btn=el('button','stg-btn v','🎣 按住收线');
  btn.addEventListener('pointerdown',function(e){e.preventDefault();hold=true;});window.addEventListener('pointerup',function(){hold=false;});
  function loop(){t+=0.03;var ty=(H-tgtH)/2+Math.sin(t)*((H-tgtH)/2-4);tgt.style.top=ty+'px';vy+=hold?-0.55:0.45;vy*=0.9;barY+=vy;if(barY<0){barY=0;vy=0;}if(barY>H-barH){barY=H-barH;vy=0;}bar.style.top=barY+'px';var ov=(barY<ty+tgtH)&&(barY+barH>ty);p+=ov?0.8:-0.5;if(p<0)p=0;if(p>100)p=100;pf.style.height=p+'%';if(!won)msg.textContent=ov?'罩住了！稳住～ '+Math.round(p)+'%':'按住/松手去罩住🐟';if(p>=100&&!won){won=true;msg.textContent='通关！';bigFlash(s,'🎉 稳住啦!',true);}requestAnimationFrame(loop);}
  s.appendChild(wrap);s.appendChild(msg);s.appendChild(btn);loop();
}});

demo({id:'claw',cat:'g',title:'抓娃娃机（横移+下抓）',teach:'教「抓正确样本」——只抓干净数据',mount:function(s){
  var ITEMS=[{e:'🐱',c:1,x:12},{e:'💩',c:0,x:30},{e:'🍎',c:1,x:50},{e:'💩',c:0,x:70},{e:'🐶',c:1,x:88}];
  var score=0,clawX=50,dir=1,state='move',dropY=0,grabbed=null;
  var sc=el('div','stg-score','0 分');s.appendChild(sc);
  var box=el('div');box.style.cssText='position:relative;width:100%;height:190px';
  var claw=el('div',null,'🦾');claw.style.cssText='position:absolute;top:0;font-size:26px;transform:translateX(-50%);transition:none;z-index:2';
  var rope=el('div');rope.style.cssText='position:absolute;top:0;width:3px;background:#ffd66d;transform:translateX(-50%);height:8px';
  box.appendChild(rope);box.appendChild(claw);
  ITEMS.forEach(function(o){var d=el('div',null,o.e);d.style.cssText='position:absolute;bottom:6px;left:'+o.x+'%;transform:translateX(-50%);width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:24px;background:'+(o.c?'rgba(88,204,2,.22)':'rgba(251,113,133,.22)');o.el=d;box.appendChild(d);});
  var msg=el('div','stg-msg','抓钩横向移动，点按钮向下抓');var btn=el('button','stg-btn','⬇️ 抓！');
  function pos(){claw.style.left=clawX+'%';rope.style.left=clawX+'%';claw.style.top=dropY+'px';rope.style.height=(dropY+8)+'px';}
  function loop(){if(state==='move'){clawX+=dir*0.55;if(clawX>92){clawX=92;dir=-1;}if(clawX<8){clawX=8;dir=1;}}else if(state==='drop'){dropY+=4;if(dropY>=140){grab();state='up';}}else if(state==='up'){dropY-=5;if(dropY<=0){dropY=0;if(grabbed){grabbed.el.remove();grabbed=null;}state='move';}}pos();requestAnimationFrame(loop);}
  function grab(){var hit=null,best=9;ITEMS.forEach(function(o){if(!o.el.parentElement)return;var d=Math.abs(o.x-clawX);if(d<best){best=d;hit=o;}});if(hit){grabbed=hit;if(hit.c){score+=10;bigFlash(s,'🐱 干净数据 +10',true);}else{score=Math.max(0,score-8);bigFlash(s,'💩 脏数据 -8',false);}sc.textContent=score+' 分';}else{msg.textContent='没抓到，再瞄准！';}}
  btn.onclick=function(){if(state==='move'){state='drop';dropY=0;}};
  s.appendChild(box);s.appendChild(msg);s.appendChild(btn);pos();loop();
}});

demo({id:'quick',cat:'g',title:'二选一快判',teach:'教「快速判断」——WarioWare 式',mount:function(s){
  var Q=[{t:'手机认出照片里的猫',a:1},{t:'计算器算 1+1',a:0},{t:'AI 下棋赢冠军',a:1},{t:'闹钟准点响',a:0},{t:'翻译软件翻句子',a:1},{t:'电灯按开关亮',a:0}];
  var i=0,score=0;var sc=el('div','stg-score','0 分');s.appendChild(sc);
  var card=el('div');card.style.cssText='font-size:20px;color:#1e1b3a;font-weight:800;text-align:center;min-height:60px;display:grid;place-items:center;padding:10px';
  var btns=el('div');btns.style.cssText='display:flex;gap:12px';
  var msg=el('div','stg-msg','这是 AI 学来的，还是人写死的？');
  function show(){card.textContent=Q[i%Q.length].t;}
  [['🤖 AI学的',1],['⚙️ 人写的',0]].forEach(function(b){var bn=el('button','stg-btn'+(b[1]?' v':''),b[0]);bn.style.marginTop='0';bn.onclick=function(){var ok=Q[i%Q.length].a===b[1];if(ok){score+=10;bigFlash(s,'✓ 对!',true);}else{bigFlash(s,'✗ 再想想',false);}sc.textContent=score+' 分';i++;show();};btns.appendChild(bn);});

demo({id:'pool',cat:'v',title:'池化压缩（可多层）',teach:'一层层缩小，每次每块只留最强信号',mount:function(s){
  s.classList.add('light');
  function rnd(n){var m=[];for(var r=0;r<n;r++){m.push([]);for(var c=0;c<n;c++)m[r].push(Math.floor(Math.random()*10));}return m;}
  var stages=[rnd(8)];
  var wrap=el('div');wrap.style.cssText='display:flex;gap:8px;align-items:center;overflow-x:auto;width:100%;padding:4px';
  var msg=el('div','stg-msg','点「压缩一层」：8×8 → 4×4 → 2×2 → 1×1');var btn=el('button','stg-btn v','🗜️ 压缩一层');
  function mkgrid(m){var sz=Math.max(11,Math.min(28,110/m.length));var g=el('div');g.style.cssText='flex:none;display:grid;grid-template-columns:repeat('+m.length+','+sz+'px);gap:2px';m.forEach(function(row){row.forEach(function(v){var d=el('div',null,m.length<=4?v:'');d.style.cssText='width:'+sz+'px;height:'+sz+'px;border-radius:3px;background:hsl(258,60%,'+(88-v*6)+'%);color:'+(v>5?'#fff':'#333')+';display:grid;place-items:center;font-size:11px;font-weight:800';g.appendChild(d);});});return g;}
  function pool(m){var n=m.length/2,r=[];for(var i=0;i<n;i++){r.push([]);for(var j=0;j<n;j++)r[i].push(Math.max(m[2*i][2*j],m[2*i][2*j+1],m[2*i+1][2*j],m[2*i+1][2*j+1]));}return r;}
  function draw(){wrap.innerHTML='';stages.forEach(function(m,i){if(i>0){var ar=el('div',null,'→');ar.style.cssText='flex:none;font-size:20px;color:#8b5cf6';wrap.appendChild(ar);}wrap.appendChild(mkgrid(m));});}
  btn.onclick=function(){var last=stages[stages.length-1];if(last.length<=1){msg.textContent='已缩到 1×1！点右上角 ↻ 重来';return;}stages.push(pool(last));draw();bigFlash(s,'缩一半!',true);if(stages[stages.length-1].length===1)msg.textContent='缩到 1×1——只剩一个最强信号！';};
  s.appendChild(wrap);s.appendChild(msg);s.appendChild(btn);draw();
}});

demo({id:'grad',cat:'e',title:'梯度下降·下山找最低点',teach:'AI 学习=一步步往误差更低处走',mount:function(s){
  var cv=document.createElement('canvas');cv.width=300;cv.height=150;cv.style.cssText='background:#f4f6fb;border-radius:8px;max-width:100%';var ctx=cv.getContext('2d');
  var cx=150,bx;

  function sy(x){return 25+(1-loss(x))*100;}
  function draw(){ctx.clearRect(0,0,300,150);ctx.strokeStyle='#4b3f7a';ctx.lineWidth=2.5;ctx.beginPath();for(var x=15;x<=285;x+=2){var y=sy(x);if(x===15)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();ctx.fillStyle='#22d3ee';ctx.shadowColor='#22d3ee';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(bx,sy(bx)-8,7,0,7);ctx.fill();ctx.shadowBlur=0;}
  bx=30+Math.random()*40;if(Math.random()>0.5)bx=300-bx;
  var msg=el('div','stg-msg','点「走一步」，小球顺坡滚向最低点');var btn=el('button','stg-btn v','⛷️ 走一步');
  btn.onclick=function(){var g=2*(bx-cx)/(120*120);bx-=g*4200;bx=Math.max(15,Math.min(285,bx));draw();if(Math.abs(bx-cx)<6){bigFlash(s,'🏁 最低点!',true);msg.textContent='误差最低！AI 就是这样一步步学好的';}else{msg.textContent='往低处走…还差一点';}};

demo({id:'neuron',cat:'e',title:'神经元·兴奋到点火',teach:'反复给刺激，兴奋度超过门槛就会激活',mount:function(s){
  s.classList.add('light');
  var excite=18,threshold=72,fireCount=0,last=performance.now(),alive=true;
  var core=el('div',null,'😴');core.style.cssText='font-size:46px;width:82px;height:82px;border-radius:50%;display:grid;place-items:center;background:#e5e7eb;transition:all .16s;margin:2px auto 8px';
  var bar=el('div');bar.style.cssText='height:18px;width:86%;max-width:290px;border-radius:12px;background:#e5e7eb;overflow:hidden;margin:8px auto;position:relative;box-shadow:inset 0 1px 4px rgba(0,0,0,.12)';
  var fill=el('div');fill.style.cssText='height:100%;width:18%;border-radius:12px;background:linear-gradient(90deg,#a78bfa,#22d3ee,#58cc02);transition:width .08s';
  var thm=el('div');thm.style.cssText='position:absolute;top:-3px;bottom:-3px;width:3px;background:#f59e0b;left:'+threshold+'%;box-shadow:0 0 8px #f59e0b';
  bar.appendChild(fill);bar.appendChild(thm);
  var lbl=el('div','stg-msg','一直点按钮，让兴奋度超过橙色门槛');
  var count=el('div','stg-msg','点火 0 次');
  var btn=el('button','stg-btn v','⚡ 给一个刺激');
  function paint(){
    fill.style.width=Math.round(excite)+'%';
    if(excite>=threshold){core.textContent='⚡';core.style.background='#fde68a';core.style.boxShadow='0 0 22px rgba(251,191,36,.75)';lbl.textContent='点火了！刺激够强，神经元把信号传下去了';}
    else if(excite>=48){core.textContent='😳';core.style.background='#ede9fe';core.style.boxShadow='none';lbl.textContent='快兴奋起来了，但还没过门槛';}
    else{core.textContent='😴';core.style.background='#e5e7eb';core.style.boxShadow='none';lbl.textContent='兴奋度会自己回落，要连续给刺激';}
  }
  function loop(now){
    if(!alive)return;

  }
  btn.onclick=function(e){

demo({id:'diffusion',cat:'v',title:'扩散去噪画室',teach:'进阶「扩散模型」——从噪点一步步擦出图案',mount:function(s){
  var note=el('div','adv-note','进阶课：扩散模型怎么画画 · 核心动作 = 反复去噪，不是一笔画完');
  var wrap=el('div','noise-lab'),cv=document.createElement('canvas'),ctx=cv.getContext('2d');
  cv.className='noise-canvas';cv.width=28;cv.height=28;
  var panel=el('div','noise-panel');
  var meter=el('div','noise-meter','<i></i>');
  var msg=el('div','stg-msg','噪声 100% · 点一下去噪一步');
  var steps=el('div');
  ['乱点','轮廓','颜色','完成'].forEach(function(t,i){steps.appendChild(el('div','noise-step'+(i===0?' on':''),'<b>'+(i+1)+'</b><span>'+t+'</span>'));});
  var btn=el('button','stg-btn v','✨ 去噪一步');
  panel.appendChild(steps);panel.appendChild(meter);panel.appendChild(msg);panel.appendChild(btn);
  wrap.appendChild(cv);wrap.appendChild(panel);
  var step=0,N=28;
  function target(x,y){
    var dx=x-14,dy=y-14,d=Math.sqrt(dx*dx+dy*dy);
    if(d<8 && y>5 && y<22) return [255,214,109];
    if(Math.abs(dx)<2 && y>=18) return [120,72,35];
    if(d<5 && y<12) return [88,204,2];
    if(Math.abs(dx)>4 && Math.abs(dx)<8 && y>9 && y<15) return [251,113,133];
    return [18,24,38];
  }
  function draw(){
    var noise=Math.max(0,1-step/7),img=ctx.createImageData(N,N);
    for(var y=0;y<N;y++)for(var x=0;x<N;x++){
      var t=target(x,y),k=(y*N+x)*4,mix=1-noise;
      img.data[k]=t[0]*mix+Math.random()*255*noise;
      img.data[k+1]=t[1]*mix+Math.random()*255*noise;
      img.data[k+2]=t[2]*mix+Math.random()*255*noise;
      img.data[k+3]=255;
    }
    ctx.putImageData(img,0,0);
    meter.querySelector('i').style.width=Math.round(noise*100)+'%';
    msg.textContent=noise>0?'噪声 '+Math.round(noise*100)+'% · 继续去噪':'完成：噪点里长出图案';
    steps.querySelectorAll('.noise-step').forEach(function(n,i){n.classList.toggle('on',i<=Math.min(3,Math.floor(step/2)));});
  }
  btn.onclick=function(e){if(step<7){step++;draw();}if(step>=7){bigFlash(s,'画好了!',true);spark(e.clientX,e.clientY);}};
  s.appendChild(note);s.appendChild(wrap);draw();
}});

demo({id:'rltrail',cat:'g',title:'强化学习·踩格子探路',teach:'进阶「强化学习」——靠踩坑和奖励找出正确路线',mount:function(s){
  var note=el('div','adv-note','进阶课：强化学习 · 核心动作 = 先试错，再把有奖励的路线记下来');
  var board=el('div','trail-board'),top=el('div','trail-top'),msg=el('div','stg-msg','从起点出发，只能点相邻格。踩坑没关系，它会告诉你别走这里。');
  var actions=el('div','trail-actions'),legend=el('div','trail-legend','<span>🤖 当前位置</span><span>⭐ 奖励</span><span>🟦 走过</span><span>⚠️ 坑</span>');
  var reward=0,tries=1,pos=20,goal=4,path={20:1,21:1,16:1,11:1,12:1,13:1,8:1,3:1,4:1},pit={15:1,22:1,17:1,10:1,7:1,18:1,2:1},seen={},route=[20],won=false;
  top.innerHTML='<span id="trailTry">第 1 次探路</span><span id="trailReward">奖励 0</span>';
  function near(a,b){var ax=a%5,ay=Math.floor(a/5),bx=b%5,by=Math.floor(b/5);return Math.abs(ax-bx)+Math.abs(ay-by)===1;}
  function paint(){
    board.innerHTML='';
    for(var i=0;i<25;i++){
      var cls='trail-cell',txt='';
      if(i===20){cls+=' start';txt='起';}
      if(i===goal){cls+=' goal';txt='⭐';}
      if(seen[i]&&path[i]&&i!==20&&i!==goal){cls+=' step';txt='✓';}
      if(seen[i]&&pit[i]){cls+=' pit';txt='⚠';}
      if(i===pos)txt='🤖';
      var d=el('button',cls,txt);d.dataset.i=i;
      d.onclick=function(e){stepTo(+this.dataset.i,e);};
      board.appendChild(d);
    }
    document.getElementById('trailTry').textContent='第 '+tries+' 次探路';
    document.getElementById('trailReward').textContent='奖励 '+reward;
  }
  function resetPos(){pos=20;route=[20];tries++;msg.textContent='从起点再试一次。刚才的坑已经记住了。';paint();}
  function stepTo(i,e){
    if(won||!near(pos,i)){msg.textContent='只能踩相邻格，一步一步试。';return;}
    pos=i;seen[i]=1;route.push(i);
    if(pit[i]){reward=Math.max(0,reward-1);bigFlash(s,'踩坑了',false);msg.textContent='踩坑：这格以后少走。强化学习就是用惩罚修正路线。';setTimeout(resetPos,650);}
    else if(i===goal){reward+=10;won=true;paint();bigFlash(s,'找到路线!',true);msg.textContent='拿到奖励！这条路线会被记得更牢：'+route.map(function(x){return x===20?'起':x===4?'终':x;}).join(' → ');}
    else if(path[i]){reward+=1;msg.textContent='走对一格，奖励 +1。继续沿着好信号探路。';paint();spark(e.clientX,e.clientY);}
    else{reward=Math.max(0,reward-1);msg.textContent='走偏了，奖励 -1。可以退回起点重新试。';paint();}
  }
  var rb=el('button','stg-btn v','从起点重试');rb.onclick=function(){resetPos();};
  actions.appendChild(rb);
  s.appendChild(note);s.appendChild(top);s.appendChild(board);s.appendChild(actions);s.appendChild(legend);s.appendChild(msg);seen[20]=1;paint();
}});

demo({id:'overfit',cat:'e',title:'过拟合·死记 vs 真学会',teach:'太用力记每个点，反而学不到规律',mount:function(s){
  var cv=document.createElement('canvas');cv.width=300;cv.height=150;cv.style.cssText='background:#f4f6fb;border-radius:8px;max-width:100%';var ctx=cv.getContext('2d');
  var P=[];for(var i=0;i<9;i++){var x=25+i*31,y=90-i*4+(Math.random()*40-20);P.push({x:x,y:Math.max(20,Math.min(130,y))});}
  var c=0.3;
  function straightY(x){var a=P[0],b=P[P.length-1];return a.y+(b.y-a.y)*(x-a.x)/(b.x-a.x);}
  function zigY(x){for(var i=0;i<P.length-1;i++){if(x>=P[i].x&&x<=P[i+1].x){var t=(x-P[i].x)/(P[i+1].x-P[i].x);return P[i].y+(P[i+1].y-P[i].y)*t;}}return P[P.length-1].y;}
  function draw(){ctx.clearRect(0,0,300,150);ctx.strokeStyle='#22d3ee';ctx.lineWidth=2.5;ctx.beginPath();for(var x=P[0].x;x<=P[P.length-1].x;x++){var y=straightY(x)*(1-c)+zigY(x)*c;if(x===P[0].x)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();ctx.fillStyle='#ffd66d';P.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,4,0,7);ctx.fill();});}
  var lbl=el('div','stg-msg','');var rng=el('input');rng.type='range';rng.min=0;rng.max=100;rng.value=30;rng.style.cssText='width:80%;accent-color:#8b5cf6';
  rng.oninput=function(){c=+rng.value/100;draw();lbl.innerHTML=c<0.3?'线太直——<b>没抓到规律（欠拟合）</b>':c<0.72?'<b style="color:#16a34a">刚刚好！抓住了大趋势</b>':'线太扭——<b style="color:#dc2626">死记每个点（过拟合）</b>';};
  s.appendChild(cv);s.appendChild(rng);s.appendChild(lbl);draw();rng.oninput();
}});

      b.style.cssText+=';text-align:left;white-space:normal;line-height:1.45;padding:10px 14px;font-size:13px;margin-top:0';
      b.onclick=function(e){
        if(o.ok){score++;idx++;spark(e.clientX,e.clientY);var pct=Math.round(score/need*100);bar.style.width=pct+'%';face.textContent=pct>=100?'😊':pct>=50?'🙂':'😐';barLbl.innerHTML='👍 你选了更好的！AI 对齐度 '+pct+'%';setTimeout(draw,480);}
        else{bigFlash(s,'🤔 另一版更好哦',false);}
      };
      opts.appendChild(b);
    });
  }
  var hint=el('div','stg-msg','两版回答，选你觉得更好的 —— 这就是 RLHF 在做的事');
  s.appendChild(face);s.appendChild(barWrap);s.appendChild(barLbl);s.appendChild(qv);s.appendChild(opts);s.appendChild(hint);draw();
}});

// ============ 渲染 ============
var CATS=[['all','🌐 全部'],['g','🎮 游戏交互'],['v','🔬 可视化讲解'],['e','🎚️ 探索模拟']];
var tabsEl=document.getElementById('tabs'),gridEl=document.getElementById('grid'),cur='all';
CATS.forEach(function(c){var t=el('div','tab'+(c[0]==='all'?' on':''),c[1]);t.dataset.c=c[0];t.onclick=function(){if(dragged)return;cur=c[0];tabsEl.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x.dataset.c===cur);});render();};tabsEl.appendChild(t);});
var CATCLS={g:'cat-g',v:'cat-v',e:'cat-e'},CATTXT={g:'🎮游戏',v:'🔬可视化',e:'🎚️探索'};
function render(){gridEl.innerHTML='';DEMOS.forEach(function(d,i){if(cur!=='all'&&d.cat!==cur)return;var card=el('div','demo');var head=el('div','demo-head','<span class="n">'+(i+1)+'</span><b>'+d.title+'</b><span class="cat '+CATCLS[d.cat]+'">'+CATTXT[d.cat]+'</span>');var rb=el('button','reset-btn','↻');rb.title='重置';head.appendChild(rb);var teach=el('div','demo-teach','💡 '+d.teach);var stage=el('div','demo-stage noselect');function run(){stage.innerHTML='';stage.className='demo-stage noselect';try{d.mount(stage);}catch(err){stage.innerHTML='<div class="stg-msg">demo 加载出错：'+(err&&err.message?err.message:'未知错误')+'</div>';}}rb.onclick=run;card.appendChild(head);card.appendChild(teach);card.appendChild(stage);gridEl.appendChild(card);run();});}
// 标签条拖动滚动
var down=false,startX,scl,dragged=false;
tabsEl.addEventListener('pointerdown',function(e){down=true;dragged=false;startX=e.clientX;scl=tabsEl.scrollLeft;tabsEl.classList.add('drag');});
window.addEventListener('pointermove',function(e){if(!down)return;var dx=e.clientX-startX;if(Math.abs(dx)>5)dragged=true;tabsEl.scrollLeft=scl-dx;});
window.addEventListener('pointerup',function(){down=false;tabsEl.classList.remove('drag');setTimeout(function(){dragged=false;},50);});
render();
</script>
</body>
