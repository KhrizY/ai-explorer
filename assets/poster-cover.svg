<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">AI 探险号海报封面</title>
  <desc id="desc">给 9-12 岁孩子的互动式 AI 启蒙课程海报。</desc>
  <defs>
    <radialGradient id="cyanGlow" cx="50%" cy="36%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.38"/>
      <stop offset="48%" stop-color="#8b5cf6" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#080615" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="50%" cy="58%" r="48%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="70%" stop-color="#1b1243" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#080615" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#100c25"/>
      <stop offset="48%" stop-color="#1b1243"/>
      <stop offset="100%" stop-color="#080615"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="46%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8f9ff"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="52%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#58cc02"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#050313" flood-opacity="0.55"/>
    </filter>
    <filter id="titleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#050313" flood-opacity="0.68"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22d3ee" flood-opacity="0.16"/>
    </filter>
    <pattern id="stars" width="78" height="78" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="12" r="1.4" fill="#fff" opacity="0.52"/>
      <circle cx="56" cy="31" r="1.1" fill="#c4f1ff" opacity="0.42"/>
      <circle cx="32" cy="65" r="1.2" fill="#e9d5ff" opacity="0.36"/>
    </pattern>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 0H120M0 0V120" stroke="#ffffff" stroke-width="1" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="1600" fill="url(#bg)"/>
  <rect width="1200" height="1600" fill="url(#cyanGlow)"/>
  <rect width="1200" height="1600" fill="url(#violetGlow)"/>
  <rect width="1200" height="1600" fill="url(#stars)" opacity="0.86"/>
  <rect width="1200" height="1600" fill="url(#grid)"/>

  <circle cx="600" cy="770" r="430" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.18"/>
  <circle cx="600" cy="770" r="520" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.10"/>
  <circle cx="600" cy="770" r="300" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.13" stroke-dasharray="10 20"/>

  <g opacity="0.95" filter="url(#softShadow)">
    <rect x="130" y="118" width="940" height="1364" rx="54" fill="#ffffff" opacity="0.035" stroke="#c4b5fd" stroke-opacity="0.20"/>
  </g>

  <g text-anchor="middle" filter="url(#titleShadow)">
    <text x="600" y="332" fill="#a5f3fc" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="900" letter-spacing="6">INTERACTIVE AI LITERACY LAB</text>
    <text x="600" y="520" fill="url(#titleGrad)" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="154" font-weight="900" letter-spacing="0">AI 探险号</text>
    <text x="600" y="635" fill="url(#subGrad)" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="70" font-weight="900">把人工智能玩懂</text>
  </g>

  <g text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-weight="800">
    <text x="600" y="750" fill="#e9d5ff" font-size="34">给 9-12 岁孩子的互动式 AI 启蒙</text>
    <text x="600" y="812" fill="#cbd5ff" font-size="28">动画 · 游戏化组件 · 阿波讲解 · 众包课程</text>
  </g>

  <g transform="translate(600 988)" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="-382" y="-76" width="764" height="152" rx="36" fill="#ffffff" opacity="0.08" stroke="#c4b5fd" stroke-opacity="0.26"/>
    <text y="-18" fill="#ffffff" font-size="30" font-weight="900">大模型 / Agent / RAG / 提示词</text>
    <text y="34" fill="#c4f1ff" font-size="24" font-weight="800">从“看、学、说、做、信”出发，把硬知识变成亲手理解的体验</text>
  </g>

  <g transform="translate(600 1214)" font-family="Arial, 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <g transform="translate(-300 0)">
      <rect x="-118" y="-48" width="236" height="96" rx="28" fill="#dcfce7" stroke="#58cc02" stroke-opacity="0.48"/>
      <text y="-8" font-size="26" font-weight="900" fill="#14532d">主线课程</text>
      <text y="27" font-size="18" font-weight="800" fill="#15803d">逐段展开</text>
    </g>
    <g transform="translate(0 0)">
      <rect x="-118" y="-48" width="236" height="96" rx="28" fill="#eef2ff" stroke="#8b5cf6" stroke-opacity="0.48"/>
      <text y="-8" font-size="26" font-weight="900" fill="#4c1d95">进阶挑战</text>
      <text y="27" font-size="18" font-weight="800" fill="#6d28d9">硬核原理</text>
    </g>
    <g transform="translate(300 0)">
      <rect x="-118" y="-48" width="236" height="96" rx="28" fill="#ecfeff" stroke="#22d3ee" stroke-opacity="0.48"/>
      <text y="-8" font-size="26" font-weight="900" fill="#155e75">众包创作</text>
      <text y="27" font-size="18" font-weight="800" fill="#0891b2">课程码发布</text>
    </g>
  </g>

  <g transform="translate(600 1418)" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <text fill="#e9d5ff" font-size="26" font-weight="900">AI Explorer · 让下一代先玩懂 AI</text>
    <text y="46" fill="#a5b4fc" font-size="20" font-weight="800">khrizy.github.io / ai-explorer</text>
  </g>
</svg>
