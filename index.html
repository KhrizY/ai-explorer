<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 探险号 · 星空实验室</title>
<link rel="stylesheet" href="ui-system.css">
<style>
  html,body{height:100%;} html{color-scheme:light;} body{margin:0;overflow-x:hidden;-webkit-user-select:none;user-select:none;}
  #app{min-height:100vh;}
  .screen{display:none;min-height:100vh;} .screen.on{display:block;animation:fadeUp .4s ease both;}
  body.debug-end .screen.on,body.debug-end .section,body.debug-end .ixbox-hint,body.debug-end .fbline{animation:none!important;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .map-title{text-align:center;color:#e9d5ff;padding:8px 0 0;}
  .map-title h1{font-size:24px;margin:0;} .map-title p{font-size:13px;color:#b4aede;margin:6px 0 0;}
  .wb-top{display:flex;align-items:center;gap:12px;max-width:720px;margin:0 auto;padding:14px 18px 0;}
  .wb-top .tb-back{background:#ede9fe;color:#6d28d9;box-shadow:0 3px 0 #c4b5fd;}
  .wb-top .title{font-weight:900;color:#1e1b3a;font-size:16px;}
  .wb-top .xp{margin-left:auto;font-size:13px;font-weight:800;color:#eab308;background:#fffbeb;border:1px solid #fde68a;padding:5px 12px;border-radius:999px;}
  .hook{background:linear-gradient(135deg,#fef9ff,#eef1fb);border:1.5px solid #ece9f7;border-left:4px solid var(--violet);border-radius:12px;padding:12px 14px;font-size:14.5px;color:#4b4869;line-height:1.6;margin-bottom:14px;}
  .hook b{color:#6d28d9;}
  .peg{display:inline-block;margin-top:8px;font-size:13px;background:#f5f3ff;color:#6d28d9;padding:4px 10px;border-radius:999px;font-weight:700;}
  .apo{font-weight:800;color:#6d28d9;}
  .term-card .tp-pro{margin-top:10px;padding-top:10px;border-top:1px dashed #e6e9f2;font-size:13px;color:#8b5cf6;line-height:1.65;}
  .adv-wrap{max-width:840px;margin:10px auto 46px;padding:0 14px;}
  .adv-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.35),transparent);margin:26px 0 20px;}
  .adv-title{color:#e9d5ff;font-size:19px;text-align:center;margin:0 0 4px;}
  .adv-sub{color:#8b83b8;font-size:12.5px;text-align:center;margin-bottom:18px;}
  .adv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .adv-card{background:linear-gradient(160deg,rgba(45,32,90,.7),rgba(20,14,48,.82));border:1px solid rgba(167,139,250,.25);border-radius:16px;padding:14px 12px;cursor:pointer;transition:transform .18s,box-shadow .18s;}
  .adv-card:hover{transform:translateY(-4px);box-shadow:0 0 22px rgba(139,92,246,.45);}
  .adv-card .ae{font-size:30px;} .adv-card .at{color:#fff;font-weight:800;font-size:14px;margin:6px 0 3px;line-height:1.3;}
  .adv-card .ac{font-size:10.5px;color:#b4aede;} .adv-card .an{font-size:10.5px;color:#8b83b8;margin-top:5px;}
  .adv-pop{position:fixed;inset:0;display:none;place-items:center;z-index:80;background:rgba(10,6,32,.6);backdrop-filter:blur(3px);padding:16px;}
  .adv-pop.open{display:grid;}
  .adv-card2{background:#fff;border-radius:18px;padding:22px 24px;max-width:360px;width:100%;max-height:80vh;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.5);border-top:6px solid var(--violet);animation:popIn .3s var(--ease-bounce,ease);}
  .adv-card2 .cat{font-size:12px;color:#8b5cf6;font-weight:800;} .adv-card2 h3{margin:2px 0 0;font-size:20px;color:#1e1b3a;}
  .adv-card2 .badge{display:inline-block;font-size:11px;background:#f5f3ff;color:#6d28d9;padding:3px 10px;border-radius:999px;margin:10px 0;font-weight:700;}
  .adv-card2 ul{margin:6px 0 0;padding-left:20px;} .adv-card2 li{font-size:14px;color:#4b4869;line-height:1.8;}
  .ixr{margin-left:auto;border:none;background:#ede9fe;color:#6d28d9;width:24px;height:24px;border-radius:7px;font-weight:900;cursor:pointer;font-size:13px;}
  .ixr:hover{background:#ddd6fe;}
  .top-actions{display:flex;gap:8px;align-items:center;}
  .top-mini{border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.12);color:#fff;border-radius:12px;height:36px;min-width:36px;padding:0 10px;font-weight:900;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.24);}
  .top-mini:active{transform:translateY(3px);box-shadow:none;}
  .badge-pop{position:fixed;inset:0;display:none;place-items:center;z-index:90;background:rgba(10,6,32,.62);backdrop-filter:blur(3px);padding:16px;}
  .badge-pop.open{display:grid;}
  .badge-panel{background:#fff;border-radius:20px;padding:20px;width:min(620px,100%);max-height:84vh;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.45);border-top:6px solid var(--gold);}
  .badge-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .badge-head h3{margin:0;font-size:20px;color:#1e1b3a;}
  .badge-head button{margin-left:auto;border:none;background:#f5f3ff;color:#6d28d9;border-radius:10px;width:32px;height:32px;font-weight:900;cursor:pointer;}
  .badge-stat{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 14px;}
  .badge-stat div{background:#f8fafc;border:1px solid #e6e9f2;border-radius:12px;padding:10px;text-align:center;font-size:12px;color:#6b7280;}
  .badge-stat b{display:block;color:#6d28d9;font-size:16px;margin-top:2px;}
  .badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .badge-item{border:1.5px solid #e6e9f2;background:#fff;border-radius:14px;padding:12px;text-align:center;}
  .badge-item.locked{filter:grayscale(1);opacity:.48;}
  .badge-item .be{font-size:34px}.badge-item .bt{font-weight:900;color:#1e1b3a;font-size:13px;margin-top:4px}.badge-item .bs{font-size:11px;color:#6b7280;line-height:1.45;margin-top:4px}
  .fbline{border-radius:12px;padding:9px 12px;font-size:12.5px;font-weight:900;text-align:center;margin:9px auto 0;max-width:360px;animation:popIn .24s var(--ease-bounce,ease);}
  .fbline.ok{background:#ecfdf5;color:#15803d;border:1px solid #bbf7d0;}
  .fbline.gentle{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
  .done-pill{display:inline-block;margin-top:7px;background:#ecfdf5;color:#15803d;border:1px solid #bbf7d0;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;}
  .coin{position:fixed;pointer-events:none;z-index:60;font-weight:900;color:#eab308;font-size:19px;will-change:transform,opacity;}
  .coin.one{font-size:22px;text-shadow:0 2px 8px #fff;}
  .coin-pop{position:fixed;pointer-events:none;z-index:58;font-size:22px;will-change:transform,opacity;text-shadow:0 2px 8px #fff;}
  .gembump{animation:gb .45s ease;}
  @keyframes gb{0%,100%{transform:scale(1)}40%{transform:scale(1.32)}}
  .game-stage-light{position:relative;height:240px;background:linear-gradient(180deg,#f8fafc,#eef2ff);border:2px solid #e6e9f2;border-radius:14px;overflow:hidden;touch-action:manipulation;}
  .game-chip{position:absolute;display:grid;place-items:center;border-radius:14px;background:#fff;border:2px solid #e6e9f2;box-shadow:0 6px 14px rgba(60,50,110,.13);cursor:pointer;user-select:none;}
  .game-chip.good{border-color:#bbf7d0;background:#ecfdf5}.game-chip.bad{border-color:#fde68a;background:#fffbeb}
  .game-hud{display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:900;color:#6d28d9;font-size:13px;margin-bottom:8px;flex-wrap:wrap;}
  .game-hud span{white-space:nowrap;}
  .game-meter{height:9px;background:#e6e9f2;border-radius:999px;overflow:hidden;margin-bottom:10px}.game-meter i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#58cc02,#fbbf24,#fb7185);transition:width .08s linear;}
  .toastbig{position:fixed;left:50%;top:30%;transform:translateX(-50%);z-index:50;font-size:30px;font-weight:900;text-shadow:0 2px 8px #fff;animation:bigF .8s ease-out forwards;pointer-events:none;}
  @keyframes bigF{0%{opacity:0;transform:translateX(-50%) scale(.4)}30%{opacity:1;transform:translateX(-50%) scale(1.1)}70%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(1)}}
</style>
</head>
<body>
<div id="app">
  <section id="scr-map" class="screen cosmos">
    <div class="topbar">
      <div class="tb-level"><span class="ring">🚀</span><b id="lvl">AI 新手</b></div>
      <div class="tb-xp"><i id="xpbar"></i></div>
      <span class="tb-gem" id="gem">✨ 0</span>
      <div class="top-actions">
        <button class="top-mini" onclick="showBadges()" title="查看勋章">🏅</button>
        <button class="top-mini" onclick="resetProgress()" title="重置进度">↻</button>
      </div>
    </div>
    <div class="map-title"><h1>🌌 AI 星球探险</h1><p>一台机器，怎么一步步变聪明的？</p></div>
    <div class="map"><div class="map-path" id="mappath"></div></div>
    <div class="adv-wrap">
      <div class="adv-divider"></div>
      <h2 class="adv-title">🎓 进阶课程</h2>
      <div class="adv-sub">相互独立 · 挑战更硬核 · 点开看知识点</div>
      <div class="adv-grid" id="advgrid"></div>
    </div>
  </section>
  <section id="scr-ch" class="screen">
    <div class="workbench">
      <div class="wb-top">
        <button class="tb-back" onclick="goMap()">←</button>
        <span class="title" id="chtitle"></span>
        <span class="xp" id="chxp">✨ 0</span>
      </div>
      <div class="wb-inner" id="chbody"></div>
    </div>
  </section>
</div>
<div class="term-pop" id="termpop"><div class="term-card"><h4 id="tpT"></h4><p id="tpD"></p><p id="tpP" class="tp-pro"></p></div></div>
<div class="adv-pop" id="advpop"><div class="adv-card2"><div class="cat" id="apCat"></div><h3 id="apT"></h3><div class="badge">进阶课程 · 即将推出</div><ul id="apList"></ul></div></div>
<div class="badge-pop" id="badgepop"><div class="badge-panel"><div class="badge-head"><h3>🏅 勋章与成就</h3><button onclick="hideBadges()">×</button></div><div class="badge-stat" id="badgestat"></div><div class="badge-grid" id="badgegrid"></div></div></div>

<script>
// ========== 工具 ==========
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function spark(x,y){var E=['✨','⭐','🎉','💫','🌟'];for(var i=0;i<10;i++){var s=el('div','spark',E[i%5]);s.style.left=x+'px';s.style.top=y+'px';var a=Math.PI*2*i/10;s.style.setProperty('--dx',Math.cos(a)*70+'px');s.style.setProperty('--dy',(Math.sin(a)*70-26)+'px');document.body.appendChild(s);(function(z){setTimeout(function(){z.remove();},900);})(s);}}
function toast(txt,ok){var f=el('div','toastbig',txt);f.style.color=ok?'#16a34a':'#d99a12';document.body.appendChild(f);setTimeout(function(){f.remove();},800);if(ok)spark(innerWidth/2,innerHeight*0.32);}
function lineFeedback(host,ok,msg){var f=host&&host.querySelector?host.querySelector('.fbline'):null;if(!f){f=el('div','fbline');if(host)host.appendChild(f);}f.className='fbline '+(ok?'ok':'gentle');f.innerHTML=(ok?'✅ ':'💡 ')+msg;return f;}
function completeFeedback(host,msg){var f=lineFeedback(host,true,msg||'完成！');if(f&&!f.querySelector('.done-pill'))f.innerHTML+=' <span class="done-pill">完成</span>';return f;}
function clearGame(){if(window._gT){clearInterval(window._gT);window._gT=null;}if(window._gR){cancelAnimationFrame(window._gR);window._gR=null;}}
function starOf(miss){return miss===0?'⭐⭐⭐':miss<=2?'⭐⭐':'⭐';}
function buildArcadeGame(cfg,onWin,onReset){var b=ixbox(cfg.title,cfg.hint,onReset);var w=b._body;clearGame();
  var score=0,combo=0,miss=0,goal=cfg.goal||10,done=false,items=[],timeLeft=cfg.time||18000,total=timeLeft;
  var hud=el('div','game-hud');var scEl=el('span',null,(cfg.scoreName||'完成')+' 0/'+goal);var cbEl=el('span',null,'连击 0');var tmEl=el('span',null,'18s');hud.appendChild(scEl);hud.appendChild(cbEl);hud.appendChild(tmEl);
  var meter=el('div','game-meter');var fill=el('i');meter.appendChild(fill);
  var stage=el('div','game-stage-light');
  function end(e){if(done)return;done=true;clearGame();toast(starOf(miss)+' 通关!',true);lineFeedback(w,true,'通关！连击 '+combo+'，失误 '+miss+' 次');setTimeout(function(){onWin(e||{});},380);}
  function fail(msg){miss++;combo=0;cbEl.textContent='连击 0';lineFeedback(w,false,msg||'差一点，继续！');}
  function spawn(){if(done)return;var badRate=(cfg.badRate==null ? .34 : cfg.badRate),good=Math.random()>badRate,pool=good?cfg.good:cfg.bad;var icon=pool[Math.floor(Math.random()*pool.length)];
    var d=el('div','game-chip '+(good?'good':'bad'),icon);d.good=good;var sz=(cfg.size||58)+Math.random()*16;var x=3+Math.random()*78;d.style.cssText+=';width:'+sz+'px;height:'+sz+'px;left:'+x+'%;top:-20%;font-size:'+(sz*.56)+'px';d.y=-20;d.spd=(cfg.speed||.42)+Math.random()*.24+score*.015;d.onclick=function(e){if(done||d.dead)return;d.dead=1;if(d.good){score++;combo++;spark(e.clientX,e.clientY);lineFeedback(w,true,cfg.goodMsg||'命中！');scEl.textContent=(cfg.scoreName||'完成')+' '+score+'/'+goal;cbEl.textContent='连击 '+combo+(combo>=4?' 🔥':'');d.remove();if(score>=goal)end(e);}else{fail(cfg.badMsg||'这个先别点');d.animate([{transform:'scale(1)'},{transform:'scale(.7)',opacity:.2}],{duration:180});setTimeout(function(){if(d.parentElement)d.remove();},160);}};stage.appendChild(d);items.push(d);}
  function loop(){if(done)return;timeLeft-=16;tmEl.textContent=Math.max(0,Math.ceil(timeLeft/1000))+'s';fill.style.width=Math.max(0,timeLeft/total*100)+'%';
    for(var i=items.length-1;i>=0;i--){var d=items[i];if(d.dead){items.splice(i,1);continue;}d.y+=d.spd;d.style.top=d.y+'%';if(d.y>108){if(d.good)fail(cfg.missMsg||'漏掉一个目标');if(d.parentElement)d.remove();items.splice(i,1);}}
    if(timeLeft<=0){if(score>=Math.ceil(goal*.6))end({});else{timeLeft=8000;total=8000;lineFeedback(w,false,'加时 8 秒，慢慢点也可以！');}}
    window._gR=requestAnimationFrame(loop);}
  window._gT=setInterval(spawn,cfg.spawn||620);loop();w.appendChild(hud);w.appendChild(meter);w.appendChild(stage);return b;}

// ========== 存档 + 金币 ==========
var ST;try{ST=JSON.parse(localStorage.getItem('ai-explorer-2')||'null');}catch(e){ST=null;}
if(!ST)ST={xp:0,done:{},badges:[]};if(!ST.collected)ST.collected={};
function save(){try{localStorage.setItem('ai-explorer-2',JSON.stringify(ST));}catch(e){}}
function syncTop(){var lv=ST.xp<100?'AI 新手':ST.xp<300?'见习探险家':ST.xp<700?'AI 探险家':'AI 大师';document.getElementById('lvl').textContent=lv;document.getElementById('gem').textContent='✨ '+ST.xp;document.getElementById('xpbar').style.width=Math.min(100,(ST.xp%300)/3)+'%';document.getElementById('chxp').textContent='✨ '+ST.xp;}
function awardCoins(n,ev){ST.xp+=n;save();
  var x=(ev&&ev.clientX)?ev.clientX:innerWidth/2,y=(ev&&ev.clientY)?ev.clientY:140;
  var mapOn=document.getElementById('scr-map').classList.contains('on');var g=document.getElementById(mapOn?'gem':'chxp');var t=g.getBoundingClientRect();var tx=t.left+t.width/2,ty=t.top+t.height/2;
  syncTop();spark(x,y);
  var total=Math.min(16,Math.max(8,Math.round(n/4)));
  for(var i=0;i<total;i++){(function(i){var c=el('div','coin-pop','✨');var sx=x+(Math.random()*84-42),sy=y+(Math.random()*52-26);c.style.left=sx+'px';c.style.top=sy+'px';c.style.opacity='0';c.style.transform='translate(0,0) scale(.5)';document.body.appendChild(c);
    setTimeout(function(){c.style.transition='transform .28s cubic-bezier(.34,1.56,.64,1),opacity .2s';c.style.opacity='1';c.style.transform='translate('+(Math.random()*70-35)+'px,'+(-38-Math.random()*42)+'px) scale(1.12)';},i*28);
    setTimeout(function(){var r=c.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;c.style.transition='transform .72s cubic-bezier(.5,-.18,.28,1),opacity .72s';c.style.transform+=' translate('+(tx-cx)+'px,'+(ty-cy)+'px) scale(.36)';c.style.opacity='.16';},300+i*36);
    setTimeout(function(){c.remove();if(i===total-1){g.classList.remove('gembump');void g.offsetWidth;g.classList.add('gembump');}},1160+i*36);
  })(i);}
  var f=el('div','coin one','+'+n+' ✨');f.style.left=(x+10)+'px';f.style.top=(y-34)+'px';f.style.opacity='0';document.body.appendChild(f);
  requestAnimationFrame(function(){f.style.transition='transform .75s ease,opacity .75s';f.style.opacity='1';f.style.transform='translateY(-36px) scale(1.18)';});
  setTimeout(function(){f.remove();},850);}
function resetProgress(){if(!confirm('确定要重置所有金币、章节进度和勋章吗？'))return;ST={xp:0,done:{},badges:[],collected:{}};save();syncTop();renderMap();renderBadges();toast('进度已重置',false);}
function hideBadges(){document.getElementById('badgepop').classList.remove('open');}
function renderBadges(){var stat=document.getElementById('badgestat'),grid=document.getElementById('badgegrid');if(!stat||!grid)return;var total=STATIONS.filter(function(s){return CHAPTERS[s.id];}).length,done=Object.keys(ST.done||{}).length;
  stat.innerHTML='<div>金币<b>✨ '+ST.xp+'</b></div><div>已通关<b>'+done+' / '+total+'</b></div><div>已收集<b>'+(ST.badges||[]).length+' / '+total+'</b></div>';
  grid.innerHTML='';STATIONS.forEach(function(s){var ch=CHAPTERS[s.id];if(!ch)return;var got=(ST.badges||[]).indexOf(ch.badge.t)>=0;var d=el('div','badge-item'+(got?'':' locked'));d.innerHTML='<div class="be">'+(got?ch.badge.e:'🔒')+'</div><div class="bt">'+ch.badge.t+'</div><div class="bs">'+(got?ch.badge.s:'通关「'+s.id+'」章后解锁')+'</div>';grid.appendChild(d);});}
function showBadges(){renderBadges();document.getElementById('badgepop').classList.add('open');}

// ========== 术语弹窗 + 段落(支持<b>) ==========
var pop=document.getElementById('termpop');
function showTerm(t,d){document.getElementById('tpT').textContent=t;var simple=(d&&d.s)?d.s:(typeof d==='string'?d:t),pro=(d&&d.pro)?d.pro:'';document.getElementById('tpD').textContent=simple;var pe=document.getElementById('tpP');if(pro){pe.textContent=pro;pe.style.display='block';}else{pe.style.display='none';}pop.classList.add('open');}
pop.onclick=function(){pop.classList.remove('open');};
function parseP(text,terms){var e=el('div','p');var re=/\[\[([^\]]+)\]\]/g,last=0,m;
  function addHTML(str){if(!str)return;var sp=el('span',null,str);while(sp.firstChild)e.appendChild(sp.firstChild);}
  while((m=re.exec(text))){addHTML(text.slice(last,m.index));var term=m[1],def=(terms&&terms[term])||term;var b=el('span','term',term);b.onclick=(function(tt,dd){return function(ev){ev.stopPropagation();showTerm(tt,dd);};})(term,def);e.appendChild(b);last=re.lastIndex;}
  addHTML(text.slice(last));return e;}

// ========== 地图 ==========
var STATIONS=[{id:'序',emoji:'🎬',name:'是魔法吗',hue:'--st0'},{id:'看',emoji:'👁️',name:'怎么看',hue:'--st1'},{id:'学',emoji:'🧠',name:'怎么学会',hue:'--st2'},{id:'说',emoji:'💬',name:'听懂人话',hue:'--st3'},{id:'做',emoji:'🛠️',name:'会做事',hue:'--st5'},{id:'信',emoji:'⚖️',name:'该信吗',hue:'--st4'}];
function renderMap(){var mp=document.getElementById('mappath');mp.innerHTML='';var firstUndone=-1;STATIONS.forEach(function(st,i){if(firstUndone<0&&CHAPTERS[st.id]&&!ST.done[st.id])firstUndone=i;});STATIONS.forEach(function(st,i){if(i>0)mp.appendChild(el('div','map-connector'));var done=ST.done[st.id],playable=!!CHAPTERS[st.id],locked=!playable&&!done;var s=el('div','station'+(i===firstUndone?' current':'')+(locked?' locked':''));s.style.setProperty('--_h','var('+st.hue+')');s.innerHTML='<div class="st-orb">'+st.emoji+'</div><span class="st-name">'+st.id+' · '+st.name+'</span>'+(done?'<span class="st-done">✓</span>':'');if(playable){s.querySelector('.st-orb').style.cursor='pointer';s.querySelector('.st-orb').onclick=function(){enterChapter(st.id);};}mp.appendChild(s);});}

function buildPixel(rw,onReset){var b=ixbox('🔍 像素放大镜','点 3 个不同格子看数字',onReset);var w=b._body;var N=8,COL=[[124,192,255],[255,214,109],[251,113,133],[88,204,2]],got=false,seen={};
  var grid=el('div');grid.style.cssText='display:grid;grid-template-columns:repeat('+N+',26px);gap:1px;justify-content:center';
  var info=el('div',null,'点一个格子看看👆');info.style.cssText='text-align:center;font-size:13px;color:#4b4869;margin-top:8px;min-height:20px';
  for(var r=0;r<N;r++)for(var c=0;c<N;c++){var col=COL[(r+c)%4];var d=el('div');d.style.cssText='width:26px;height:26px;border-radius:3px;cursor:pointer;background:rgb('+col[0]+','+col[1]+','+col[2]+')';d.dataset.rgb=col.join(', ');d.dataset.pos=r+'-'+c;d.onclick=function(e){seen[e.target.dataset.pos]=1;var n=Object.keys(seen).length;info.innerHTML='这格 = <b style="color:#6d28d9">RGB('+e.target.dataset.rgb+')</b> —— 已看 '+n+' / 3 格';e.target.style.outline='3px solid #1e1b3a';var t=e.target;setTimeout(function(){t.style.outline='';},600);if(n>=3&&!got){got=true;rw(e);}};grid.appendChild(d);}
  w.appendChild(grid);w.appendChild(info);return b;}

function buildRGB(rw,onReset){var b=ixbox('🎨 调出橙色','拖三个滑块，混出接近🍊的颜色',onReset);var w=b._body;var TR=[240,140,20],v=[80,80,80],got=false;
  var sw=el('div');sw.style.cssText='display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:6px';
  var target=el('div',null,'🍊');target.style.cssText='width:50px;height:50px;border-radius:10px;display:grid;place-items:center;font-size:26px;background:rgb(240,140,20)';
  var mine=el('div');mine.style.cssText='width:50px;height:50px;border-radius:10px;background:rgb(80,80,80)';
  sw.appendChild(target);sw.appendChild(el('div',null,'→'));sw.appendChild(mine);
  var lbl=el('div',null,'');lbl.style.cssText='text-align:center;font-size:12.5px;color:#6b7280;margin-top:6px;min-height:18px';
  function upd(e){mine.style.background='rgb('+v[0]+','+v[1]+','+v[2]+')';var d=Math.abs(v[0]-TR[0])+Math.abs(v[1]-TR[1])+Math.abs(v[2]-TR[2]);lbl.textContent='R'+v[0]+' G'+v[1]+' B'+v[2];if(d<70&&!got){got=true;lbl.innerHTML='<b style="color:#16a34a">调出橙色啦！🎉</b>';toast('🎨 配色成功!',true);rw(e||{});}}
  w.appendChild(sw);['R','G','B'].forEach(function(nm,i){var cc=['#ef4444','#22c55e','#3b82f6'][i];var wrap=el('div');wrap.style.cssText='display:flex;align-items:center;gap:8px;width:90%;max-width:280px;margin:4px auto;font-size:12px';var t=el('span',null,nm);t.style.cssText='width:16px;color:'+cc+';font-weight:800';var r=el('input');r.type='range';r.min=0;r.max=255;r.value=v[i];r.style.cssText='flex:1;accent-color:'+cc;r.oninput=function(e){v[i]=+r.value;upd(e);};wrap.appendChild(t);wrap.appendChild(r);w.appendChild(wrap);});
  w.appendChild(lbl);upd();return b;}

function buildConv(rw,onReset){var b=ixbox('🔦 边缘探测滑窗','移动黄框，扫到 2 次边缘',onReset);var w=b._body;var N=6,IMG=[];for(var r=0;r<N;r++){IMG.push([]);for(var c=0;c<N;c++)IMG[r].push(c<3?0:1);}var wx=0,wy=0,got=false,edgeSeen={};
  var gw=el('div');gw.style.cssText='position:relative;display:grid;grid-template-columns:repeat('+N+',26px);gap:2px;width:max-content;margin:0 auto';
  for(var r=0;r<N;r++)for(var c=0;c<N;c++){var d=el('div');d.style.cssText='width:26px;height:26px;border-radius:4px;background:'+(IMG[r][c]?'#1e1b3a':'#dbe3ef');gw.appendChild(d);}
  var win=el('div');win.style.cssText='position:absolute;width:82px;height:82px;border:3px solid #f59e0b;border-radius:6px;pointer-events:none;transition:all .12s;box-shadow:0 0 12px #f59e0b;left:0;top:0';gw.appendChild(win);
  var msg=el('div',null,'');msg.style.cssText='text-align:center;font-size:12.5px;color:#6b7280;margin:8px 0';
  var ctrl=el('div');ctrl.style.cssText='display:flex;gap:6px;justify-content:center';
  function upd(e){win.style.left=(wx*28)+'px';win.style.top=(wy*28)+'px';var edge=false;for(var i=0;i<3;i++)for(var j=0;j<3;j++){if(IMG[wy+i][wx+j]!==IMG[wy+i][wx])edge=true;}win.style.borderColor=edge?'#22c55e':'#f59e0b';win.style.boxShadow='0 0 14px '+(edge?'#22c55e':'#f59e0b');if(edge&&e)edgeSeen[wx+'-'+wy]=1;var n=Object.keys(edgeSeen).length;msg.textContent=edge?'⚡ 发现边缘！已扫到 '+n+' / 2 次':'平坦区，没什么特征…';if(n>=2&&!got){got=true;toast('⚡ 找到边缘!',true);rw(e||{});}}
  [['◀',-1,0],['▶',1,0],['▲',0,-1],['▼',0,1]].forEach(function(bt){var bn=el('button','btn btn-ghost',bt[0]);bn.style.cssText+=';padding:8px 12px;font-size:14px';bn.onclick=function(e){wx=Math.max(0,Math.min(N-3,wx+bt[1]));wy=Math.max(0,Math.min(N-3,wy+bt[2]));upd(e);};ctrl.appendChild(bn);});
  w.appendChild(gw);w.appendChild(msg);w.appendChild(ctrl);upd();return b;}

function buildLayers(rw,onReset){var b=ixbox('🧅 一层层看得更懂','点"下一层"，看它从线条到物体',onReset);var w=b._body;
  var L=[['✏️','最底层','只看到简单的线条：横、竖、斜'],['🔷','中间层','线条拼成形状：弧形、圆、条纹'],['🐱','高层','形状拼成部件：猫耳朵、眼睛'],['✅','最后','综合判断：有猫，把握 92%！']],i=0;
  var icon=el('div',null,L[0][0]);icon.style.cssText='font-size:50px;text-align:center';

  var btn=el('button','btn btn-glow','下一层 →');btn.style.cssText+=';display:block;margin:10px auto 0';
  function show(e){icon.textContent=L[i][0];tt.textContent=L[i][1];ds.textContent=L[i][2];if(i===L.length-1){btn.style.display='none';toast('🎉 看懂了!',true);rw(e||{});}}
  btn.onclick=function(e){if(i<L.length-1){i++;show(e);}};
  w.appendChild(icon);w.appendChild(tt);w.appendChild(ds);w.appendChild(btn);show();return b;}

function buildPool(rw,onReset){var b=ixbox('🗜️ 池化：一层层缩小','一直压到 1×1 才完成',onReset);var w=b._body;
  function rnd(n){var m=[];for(var r=0;r<n;r++){m.push([]);for(var c=0;c<n;c++)m[r].push(Math.floor(Math.random()*10));}return m;}
  var stages=[rnd(8)],got=false;
  var wrap=el('div');wrap.style.cssText='display:flex;gap:8px;align-items:center;overflow-x:auto;padding:4px;justify-content:center';
  var msg=el('div',null,'');msg.style.cssText='text-align:center;font-size:12.5px;color:#6b7280;margin:6px 0;min-height:16px';
  var btn=el('button','btn btn-glow','🗜️ 压缩一层');btn.style.cssText+=';display:block;margin:0 auto';
  function mkgrid(m){var sz=Math.max(11,Math.min(24,96/m.length));var g=el('div');g.style.cssText='flex:none;display:grid;grid-template-columns:repeat('+m.length+','+sz+'px);gap:2px';m.forEach(function(row){row.forEach(function(v){var d=el('div',null,m.length<=4?v:'');d.style.cssText='width:'+sz+'px;height:'+sz+'px;border-radius:3px;background:hsl(258,60%,'+(88-v*6)+'%);color:'+(v>5?'#fff':'#333')+';display:grid;place-items:center;font-size:11px;font-weight:800';g.appendChild(d);});});return g;}
  function pool(m){var n=m.length/2,r=[];for(var i=0;i<n;i++){r.push([]);for(var j=0;j<n;j++)r[i].push(Math.max(m[2*i][2*j],m[2*i][2*j+1],m[2*i+1][2*j],m[2*i+1][2*j+1]));}return r;}
  function draw(){wrap.innerHTML='';stages.forEach(function(m,i){if(i>0){var ar=el('div',null,'→');ar.style.cssText='flex:none;font-size:18px;color:#8b5cf6';wrap.appendChild(ar);}wrap.appendChild(mkgrid(m));});}
  btn.onclick=function(e){var last=stages[stages.length-1];if(last.length<=1){msg.textContent='已缩到 1×1！';return;}stages.push(pool(last));draw();msg.textContent='已压缩 '+(stages.length-1)+' / 3 层';if(stages[stages.length-1].length===1){msg.textContent='缩到 1×1——只剩最强信号！';toast('🗜️ 缩到最小!',true);if(!got){got=true;rw(e);}}};
  w.appendChild(wrap);w.appendChild(msg);w.appendChild(btn);draw();return b;}

function buildWave(rw,onReset){var b=ixbox('🔊 声音是波形数字','拖到低音量和高音量各看一次',onReset);var w=b._body;
  var cv=document.createElement('canvas');cv.width=280;cv.height=88;cv.style.cssText='width:100%;background:#160f33;border-radius:8px';var ctx=cv.getContext('2d');
  var amp=26,t=0,got=false,low=false,high=false;
  if(window._waveRaf){cancelAnimationFrame(window._waveRaf);window._waveRaf=null;}
  function draw(){ctx.clearRect(0,0,280,88);ctx.strokeStyle='#22d3ee';ctx.lineWidth=2;ctx.beginPath();for(var x=0;x<280;x++){var y=44+Math.sin((x+t)/12)*amp*Math.sin(x/60);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();t+=2;window._waveRaf=requestAnimationFrame(draw);}
  var rng=el('input');rng.type='range';rng.min=0;rng.max=38;rng.value=26;rng.style.cssText='width:100%;accent-color:#8b5cf6;margin-top:8px';
  var lbl=el('div',null,'这条上下跳的线，就是声音在电脑里的样子');lbl.style.cssText='text-align:center;font-size:12.5px;color:#6b7280;margin-top:6px';
  rng.oninput=function(e){amp=+rng.value;if(amp<=8)low=true;if(amp>=32)high=true;lbl.textContent='音量 '+amp+' —— '+(low&&high?'低高都看过了':'试试拖到最小和最大');if(low&&high&&!got){got=true;rw(e);}};
  w.appendChild(cv);w.appendChild(rng);w.appendChild(lbl);draw();return b;}

function buildDetective(onWin,onReset){var b=ixbox('🕵️ 像素侦探','点"看清楚点"，再猜是什么',onReset);var w=b._body;
  return buildArcadeGame({title:'👁️ 视觉雷达冲刺',hint:'点清晰线索，别点噪声干扰',good:['🔍','⚡','🧩','📷'],bad:['🌫️','🌀','❓','🫧'],goal:6,time:22000,scoreName:'线索',goodMsg:'锁定特征！',badMsg:'这是噪声干扰',missMsg:'漏掉一条线索',speed:.38,spawn:760,size:64,badRate:.25},onWin,onReset);
  var POOL=['🐱','🐶','🍎','🚗','🌸','🐟','🚀','🍔'];var ANS=POOL[Math.floor(Math.random()*POOL.length)],res=2;
  var big=el('div',null,ANS);big.style.cssText='font-size:70px;text-align:center;filter:blur(14px)';
  var msg=el('div',null,'');msg.style.cssText='text-align:center;font-size:12.5px;color:#6b7280;margin:6px 0;min-height:18px';
  var clearer=el('button','btn btn-ghost','🔍 看清楚一点');clearer.style.cssText+=';display:block;margin:0 auto 8px';
  clearer.onclick=function(){res++;big.style.filter='blur('+Math.max(0,14-res*3)+'px)';if(res>=6)clearer.style.display='none';};
  var opts=[ANS];while(opts.length<3){var g=POOL[Math.floor(Math.random()*POOL.length)];if(opts.indexOf(g)<0)opts.push(g);}
  for(var _o=opts.length-1;_o>0;_o--){var _j=Math.floor(Math.random()*(_o+1)),_t=opts[_o];opts[_o]=opts[_j];opts[_j]=_t;}
  var guesses=el('div');guesses.style.cssText='display:flex;gap:8px;justify-content:center';
  opts.forEach(function(g){var bn=el('button','btn btn-ghost',g);bn.onclick=function(e){if(g===ANS){big.style.filter='none';msg.innerHTML='<b style="color:#16a34a">答对了！🎉</b>';onWin(e);}else{toast('再看看～',false);}};guesses.appendChild(bn);});
  w.appendChild(big);w.appendChild(clearer);w.appendChild(msg);w.appendChild(guesses);return b;}

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function chip(txt){var d=el('button','btn btn-ghost',txt);d.style.cssText+=';min-height:42px;padding:8px 10px;font-size:14px;color:#4b4869;background:#fff';d.onclick=function(e){if(done||d.disabled)return;var right=rounds[round][pos];if(txt===right){d.disabled=true;d.style.opacity='.45';var s=el('span',null,txt);s.style.cssText='background:#ecfdf5;border:1px solid #bbf7d0;color:#15803d;border-radius:999px;padding:5px 9px;font-size:13px;font-weight:900';sentence.appendChild(s);pos++;pEl.textContent=pos+' 个词';spark(e.clientX,e.clientY);if(pos>=rounds[round].length){lineFeedback(w,true,'句子通顺：'+rounds[round].join(''));round++;if(round>=rounds.length){done=true;toast(starOf(miss)+' 通关!',true);setTimeout(function(){onWin(e);},380);}else{setTimeout(render,650);}}}else{miss++;lineFeedback(w,false,'这个词接不上，看看上方句子该往哪走');d.animate([{transform:'translateX(0)'},{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(0)'}],{duration:260});}};return d;}
  function render(){pos=0;sentence.innerHTML='';bank.innerHTML='';scEl.textContent='句子 '+(round+1)+'/'+rounds.length;pEl.textContent='0 个词';var target=rounds[round],words=shuffle(target.concat(shuffle((cfg.decoys||[]).slice()).slice(0,3)));words.forEach(function(x){bank.appendChild(chip(x));});}
  render();w.appendChild(hud);w.appendChild(sentence);w.appendChild(bank);return b;}
function buildRhythmGame(cfg,onWin,onReset){var b=ixbox(cfg.title,cfg.hint,onReset);var w=b._body;clearGame();
  var score=0,combo=0,miss=0,goal=cfg.goal||10,done=false,spots=[];
  var hud=el('div','game-hud');var scEl=el('span',null,'击中 0/'+goal);var cbEl=el('span',null,'连击 0');hud.appendChild(scEl);hud.appendChild(cbEl);
  var stage=el('div','game-stage-light');stage.style.height='220px';
  function end(e){done=true;clearGame();toast(starOf(miss)+' 通关!',true);lineFeedback(w,true,'手速真快！');setTimeout(function(){onWin(e||{});},380);}
  function clearSpot(d){spots=spots.filter(function(s){return s.d!==d;});}
  function pickSpot(){var x=6,y=6,ok=false;for(var i=0;i<14;i++){x=6+Math.random()*72;y=6+Math.random()*66;ok=spots.every(function(s){return Math.abs(s.x-x)>22||Math.abs(s.y-y)>20;});if(ok)break;}return{x:x,y:y};}
  function pop(){if(done)return;var good=Math.random()>.24;var arr=good?cfg.good:cfg.bad;var ic=arr[Math.floor(Math.random()*arr.length)];var d=el('div',null,ic);var pt=pickSpot(),x=pt.x,y=pt.y;spots.push({d:d,x:x,y:y});d.style.cssText='position:absolute;left:'+x+'%;top:'+y+'%;min-width:58px;height:44px;padding:0 10px;border-radius:14px;background:#fff;border:2px solid '+(good?'#bbf7d0':'#fde68a')+';display:grid;place-items:center;font-size:20px;font-weight:900;cursor:pointer;animation:popIn .2s both;box-shadow:0 5px 12px rgba(60,50,110,.12)';var life=setTimeout(function(){if(!d.dead){if(good){miss++;combo=0;cbEl.textContent='连击 0';}clearSpot(d);if(d.parentElement)d.remove();}},cfg.life||1400);d.onclick=function(e){if(d.dead||done)return;d.dead=1;clearTimeout(life);clearSpot(d);if(good){score++;combo++;spark(e.clientX,e.clientY);scEl.textContent='击中 '+score+'/'+goal;cbEl.textContent='连击 '+combo+(combo>=4?' 🔥':'');d.remove();if(score>=goal)end(e);}else{miss++;combo=0;cbEl.textContent='连击 0';lineFeedback(w,false,cfg.badMsg||'那个别点');d.remove();}};stage.appendChild(d);}
  window._gT=setInterval(pop,cfg.rate||640);w.appendChild(hud);w.appendChild(stage);return b;}
