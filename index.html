<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 探险号 · 星空实验室</title>
<link rel="stylesheet" href="ui-system.css">
<style>
  html,body{height:100%;} body{margin:0;overflow-x:hidden;-webkit-user-select:none;user-select:none;}
  #app{min-height:100vh;}
  .screen{display:none;min-height:100vh;} .screen.on{display:block;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .map-title{text-align:center;color:#e9d5ff;padding:8px 0 0;}
  .map-title h1{font-size:24px;margin:0;} .map-title p{font-size:13px;color:#b4aede;margin:6px 0 0;}
  .wb-top{display:flex;align-items:center;gap:12px;max-width:720px;margin:0 auto;padding:14px 18px 0;}
  .wb-top .tb-back{background:#ede9fe;color:#6d28d9;box-shadow:0 3px 0 #c4b5fd;}
  .wb-top .title{font-weight:900;color:#1e1b3a;font-size:16px;}
  .wb-top .xp{margin-left:auto;font-size:13px;font-weight:800;color:#eab308;background:#fffbeb;border:1px solid #fde68a;padding:5px 12px;border-radius:999px;}
  .hook{background:linear-gradient(135deg,#fef9ff,#eef1fb);border:1.5px solid #ece9f7;border-left:4px solid var(--violet);border-radius:12px;padding:12px 14px;font-size:14.5px;color:#4b4869;line-height:1.6;margin-bottom:14px;}
  .hook b{color:#6d28d9;}
  .peg{display:inline-block;margin-top:8px;font-size:13px;background:#f5f3ff;color:#6d28d9;padding:4px 10px;border-radius:999px;font-weight:700;}
  .apo{font-weight:800;color:#6d28d9;}
  .term-card .tp-pro{margin-top:10px;padding-top:10px;border-top:1px dashed #e6e9f2;font-size:13px;color:#8b5cf6;line-height:1.65;}
  .ixr{margin-left:auto;border:none;background:#ede9fe;color:#6d28d9;width:24px;height:24px;border-radius:7px;font-weight:900;cursor:pointer;font-size:13px;}
  .ixr:hover{background:#ddd6fe;}
  .coin{position:fixed;pointer-events:none;z-index:60;font-weight:900;color:#eab308;font-size:19px;will-change:transform,opacity;}
  .gembump{animation:gb .45s ease;}
  @keyframes gb{0%,100%{transform:scale(1)}40%{transform:scale(1.32)}}
  .toastbig{position:fixed;left:50%;top:30%;transform:translateX(-50%);z-index:50;font-size:30px;font-weight:900;text-shadow:0 2px 8px #fff;animation:bigF .8s ease-out forwards;pointer-events:none;}
  @keyframes bigF{0%{opacity:0;transform:translateX(-50%) scale(.4)}30%{opacity:1;transform:translateX(-50%) scale(1.1)}70%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(1)}}
</style>
</head>
<body>
<div id="app">
  <section id="scr-map" class="screen cosmos">
    <div class="topbar">
      <div class="tb-level"><span class="ring">🚀</span><b id="lvl">AI 新手</b></div>
      <div class="tb-xp"><i id="xpbar"></i></div>
      <span class="tb-gem" id="gem">✨ 0</span>
    </div>
    <div class="map-title"><h1>🌌 AI 星球探险</h1><p>一台机器，怎么一步步变聪明的？</p></div>
    <div class="map"><div class="map-path" id="mappath"></div></div>
  </section>
  <section id="scr-ch" class="screen">
    <div class="workbench">
      <div class="wb-top">
        <button class="tb-back" onclick="goMap()">←</button>
        <span class="title" id="chtitle"></span>
        <span class="xp" id="chxp">✨ 0</span>
      </div>
      <div class="wb-inner" id="chbody"></div>
    </div>
  </section>
</div>
<div class="term-pop" id="termpop"><div class="term-card"><h4 id="tpT"></h4><p id="tpD"></p><p id="tpP" class="tp-pro"></p></div></div>

<script>
// ========== 工具 ==========
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function spark(x,y){var E=['✨','⭐','🎉','💫','🌟'];for(var i=0;i<10;i++){var s=el('div','spark',E[i%5]);s.style.left=x+'px';s.style.top=y+'px';var a=Math.PI*2*i/10;s.style.setProperty('--dx',Math.cos(a)*70+'px');s.style.setProperty('--dy',(Math.sin(a)*70-26)+'px');document.body.appendChild(s);(function(z){setTimeout(function(){z.remove();},900);})(s);}}
function toast(txt,ok){var f=el('div','toastbig',txt);f.style.color=ok?'#16a34a':'#d99a12';document.body.appendChild(f);setTimeout(function(){f.remove();},800);if(ok)spark(innerWidth/2,innerHeight*0.32);}

// ========== 存档 + 金币 ==========
var ST;try{ST=JSON.parse(localStorage.getItem('ai-explorer-2')||'null');}catch(e){ST=null;}
if(!ST)ST={xp:0,done:{},badges:[]};if(!ST.collected)ST.collected={};
function save(){try{localStorage.setItem('ai-explorer-2',JSON.stringify(ST));}catch(e){}}
function syncTop(){var lv=ST.xp<100?'AI 新手':ST.xp<300?'见习探险家':ST.xp<700?'AI 探险家':'AI 大师';document.getElementById('lvl').textContent=lv;document.getElementById('gem').textContent='✨ '+ST.xp;document.getElementById('xpbar').style.width=Math.min(100,(ST.xp%300)/3)+'%';document.getElementById('chxp').textContent='✨ '+ST.xp;}
function awardCoins(n,ev){ST.xp+=n;save();
  var x=(ev&&ev.clientX)?ev.clientX:innerWidth/2,y=(ev&&ev.clientY)?ev.clientY:140;
  var g=document.getElementById('chxp');var t=g.getBoundingClientRect();var tx=t.left+t.width/2,ty=t.top+t.height/2;
  var f=el('div','coin','+'+n+' ✨');f.style.left=x+'px';f.style.top=y+'px';f.style.opacity='0';f.style.transform='scale(.4)';document.body.appendChild(f);
  requestAnimationFrame(function(){f.style.transition='transform .2s cubic-bezier(.34,1.56,.64,1),opacity .2s';f.style.opacity='1';f.style.transform='scale(1.3)';});
  setTimeout(function(){f.style.transition='transform .7s cubic-bezier(.5,-.2,.3,1),opacity .6s';f.style.transform='translate('+(tx-x)+'px,'+(ty-y)+'px) scale(.35)';f.style.opacity='.1';},240);
  setTimeout(function(){f.remove();syncTop();g.classList.remove('gembump');void g.offsetWidth;g.classList.add('gembump');},960);}

// ========== 术语弹窗 + 段落(支持<b>) ==========
var pop=document.getElementById('termpop');
function showTerm(t,d){document.getElementById('tpT').textContent=t;var simple=(d&&d.s)?d.s:(typeof d==='string'?d:t),pro=(d&&d.pro)?d.pro:'';document.getElementById('tpD').textContent=simple;var pe=document.getElementById('tpP');if(pro){pe.textContent=pro;pe.style.display='block';}else{pe.style.display='none';}pop.classList.add('open');}
pop.onclick=function(){pop.classList.remove('open');};
function parseP(text,terms){var e=el('div','p');var re=/\[\[([^\]]+)\]\]/g,last=0,m;
  function addHTML(str){if(!str)return;var sp=el('span',null,str);while(sp.firstChild)e.appendChild(sp.firstChild);}
  while((m=re.exec(text))){addHTML(text.slice(last,m.index));var term=m[1],def=(terms&&terms[term])||term;var b=el('span','term',term);b.onclick=(function(tt,dd){return function(ev){ev.stopPropagation();showTerm(tt,dd);};})(term,def);e.appendChild(b);last=re.lastIndex;}
  addHTML(text.slice(last));return e;}

// ========== 地图 ==========
var STATIONS=[{id:'序',emoji:'🎬',name:'是魔法吗',hue:'--st0'},{id:'看',emoji:'👁️',name:'怎么看',hue:'--st1'},{id:'学',emoji:'🧠',name:'怎么学会',hue:'--st2'},{id:'说',emoji:'💬',name:'听懂人话',hue:'--st3'},{id:'做',emoji:'🛠️',name:'会做事',hue:'--st5'},{id:'信',emoji:'⚖️',name:'该信吗',hue:'--st4'}];
function renderMap(){var mp=document.getElementById('mappath');mp.innerHTML='';var firstUndone=-1;STATIONS.forEach(function(st,i){if(firstUndone<0&&CHAPTERS[st.id]&&!ST.done[st.id])firstUndone=i;});STATIONS.forEach(function(st,i){if(i>0)mp.appendChild(el('div','map-connector'));var done=ST.done[st.id],playable=!!CHAPTERS[st.id],locked=!playable&&!done;var s=el('div','station'+(i===firstUndone?' current':'')+(locked?' locked':''));s.style.setProperty('--_h','var('+st.hue+')');s.innerHTML='<div class="st-orb">'+st.emoji+'</div><span class="st-name">'+st.id+' · '+st.name+'</span>'+(done?'<span class="st-done">✓</span>':'');if(playable){s.querySelector('.st-orb').style.cursor='pointer';s.querySelector('.st-orb').onclick=function(){enterChapter(st.id);};}mp.appendChild(s);});}
function goMap(){if(window._chT){clearInterval(window._chT);window._chT=null;}if(window._waveRaf){cancelAnimationFrame(window._waveRaf);window._waveRaf=null;}show('scr-map');renderMap();syncTop();}
function show(id){document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('on');});document.getElementById(id).classList.add('on');window.scrollTo(0,0);}

// ========== 共享：词语接龙图（更丰富，句子更长更多变） ==========
var WC_START=['小猫','今天','我','太阳','机器人'];
var WC_G={
 '小猫':[{w:'在',ok:1},{w:'苹果',ok:0}],'在':[{w:'沙发上',ok:1},{w:'草地上',ok:1},{w:'开心',ok:0}],
 '沙发上':[{w:'呼呼睡觉',ok:1,end:1},{w:'打滚儿',ok:1,end:1}],'草地上':[{w:'追蝴蝶',ok:1,end:1},{w:'晒太阳',ok:1,end:1}],
 '今天':[{w:'天气',ok:1},{w:'桌子',ok:0}],'天气':[{w:'很好',ok:1},{w:'很热',ok:1},{w:'吃饭',ok:0}],
 '很好':[{w:'适合出去玩',ok:1,end:1},{w:'适合放风筝',ok:1,end:1}],'很热':[{w:'想吃冰淇淋',ok:1,end:1},{w:'不想动',ok:1,end:1}],
 '我':[{w:'喜欢',ok:1},{w:'桌子',ok:0}],'喜欢':[{w:'画画和唱歌',ok:1,end:1},{w:'跟朋友玩',ok:1,end:1},{w:'看星星',ok:1,end:1}],
 '太阳':[{w:'慢慢升起',ok:1},{w:'香蕉',ok:0}],'慢慢升起':[{w:'照亮了大地',ok:1,end:1},{w:'暖暖的真舒服',ok:1,end:1}],
 '机器人':[{w:'会',ok:1},{w:'西瓜',ok:0}],'会':[{w:'扫地擦桌子',ok:1,end:1},{w:'唱歌跳舞',ok:1,end:1},{w:'陪我聊天',ok:1,end:1}]
};

// ========== 交互外壳(带重置) ==========
function ixbox(title,hint,onReset){var b=el('div','ixbox');var head=el('div','ixbox-title',title);if(onReset){var r=el('button','ixr','↻');r.title='重来';r.onclick=onReset;head.appendChild(r);}b.appendChild(head);var body=el('div');b.appendChild(body);if(hint)b.appendChild(el('div','ixbox-hint','👆 '+hint));b._body=body;return b;}

// —— S1 分拣(可取消选中) ——
function buildSort(rw,onReset){var b=ixbox('🃏 把它们分到正确的筐','点选中/再点取消，然后点筐',onReset);var w=b._body;
  var DATA=[{e:'🍎',a:1},{e:'🍅',a:0},{e:'🍏',a:1},{e:'🐱',a:0}],sel=null,left=DATA.length;
  var row=el('div');row.style.cssText='display:flex;gap:10px;justify-content:center;flex-wrap:wrap;min-height:52px;margin-bottom:12px';
  DATA.forEach(function(f){var d=el('div',null,f.e);d.style.cssText='width:46px;height:46px;border-radius:12px;background:#fff;display:grid;place-items:center;font-size:26px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:transform .15s';
    d.onclick=function(){if(sel&&sel.d===d){d.style.transform='';d.style.boxShadow='0 2px 6px rgba(0,0,0,.08)';sel=null;return;}row.querySelectorAll('div').forEach(function(x){x.style.transform='';x.style.boxShadow='0 2px 6px rgba(0,0,0,.08)';});d.style.transform='scale(1.2) translateY(-4px)';d.style.boxShadow='0 0 0 3px #ffd66d';sel={d:d,a:f.a};};row.appendChild(d);});
  var bins=el('div');bins.style.cssText='display:flex;gap:12px';
  [['🍎 苹果',1],['🚫 不是',0]].forEach(function(x){var bn=el('div',null,x[0]);bn.style.cssText='flex:1;padding:12px;border-radius:12px;border:2.5px dashed #b7abdf;text-align:center;font-weight:800;color:#6d28d9;cursor:pointer';bn.onclick=function(e){if(!sel)return;if(sel.a===x[1]){spark(e.clientX,e.clientY);sel.d.style.transition='.25s';sel.d.style.transform='scale(0)';var dd=sel.d;setTimeout(function(){dd.remove();},250);left--;sel=null;if(left===0){toast('全分对啦！✓',true);rw(e);}}else{bn.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:300});}};bins.appendChild(bn);});
  w.appendChild(row);w.appendChild(bins);return b;}

// —— S2 手摇训练机 ——
function buildCrank(rw,onReset){var b=ixbox('🔧 手摇训练机','狂点，从瞎猜变高手',onReset);var w=b._body;var acc=8,done=false;
  var face=el('div',null,'😵');face.style.cssText='font-size:46px;text-align:center;transition:.1s';
  var bar=el('div');bar.style.cssText='height:12px;border-radius:8px;background:#e6e9f2;overflow:hidden;margin:10px 0 6px';var fill=el('div');fill.style.cssText='height:100%;width:8%;border-radius:8px;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:.25s';bar.appendChild(fill);
  var lbl=el('div',null,'准确率 8% —— 全靠瞎猜…');lbl.style.cssText='text-align:center;font-size:13px;color:#6b7280;margin-bottom:10px';
  var btn=el('button','btn btn-glow','🔧 训练一下！');btn.style.cssText+=';display:block;margin:0 auto';
  var done100=false;
  btn.onclick=function(e){var inc=Math.max(0.8,(100-acc)*0.08);acc=Math.min(100,acc+inc);var v=Math.round(acc);fill.style.width=v+'%';face.textContent=v<25?'😵':v<55?'😐':v<85?'🙂':'😻';lbl.textContent='准确率 '+v+'% —— '+(v<25?'瞎猜…':v<55?'有感觉了…':v<85?'越来越准！':v<100?'快满分了，越来越难练…':'满分认猫高手！💯');if(v>=90&&!done){done=true;toast('🎉 训练成功!',true);rw(e);}if(v>=100&&!done100){done100=true;toast('💯 满分!',true);}};
  w.appendChild(face);w.appendChild(bar);w.appendChild(lbl);w.appendChild(btn);return b;}

// —— S3 有人教 vs 自己悟 ——
function buildCompare(rw,onReset){var b=ixbox('👀 两种学法，点开看看','两张卡都点一遍',onReset);var w=b._body;var seen={};
  var row=el('div');row.style.cssText='display:flex;gap:10px';
  [['👩‍🏫','有人教','每个例子都带标准答案，照着学——这叫[[监督学习]]'],['🧩','自己悟','没有答案，自己把相似的分成一堆堆——这叫[[无监督学习]]']].forEach(function(c,i){var card=el('div');card.style.cssText='flex:1;padding:14px 10px;border-radius:12px;background:#fff;border:2px solid #e6e9f2;text-align:center;cursor:pointer;min-height:100px';card.innerHTML='<div style="font-size:30px">'+c[0]+'</div><div style="font-weight:800;margin-top:4px">'+c[1]+'</div><div style="font-size:11px;color:#8b90a6;margin-top:4px">👆 点开看看</div>';
    card.onclick=function(e){card.innerHTML='<div style="font-size:24px">'+c[0]+'</div><div style="font-weight:800;margin:3px 0">'+c[1]+'</div>';card.appendChild(parseP(c[2],{'监督学习':{s:'每个例子都配好标准答案，AI 照着学。'},'无监督学习':{s:'没有答案，AI 自己把相似的东西分成一堆堆。'}}));card.style.borderColor='#8b5cf6';card.style.background='#f5f3ff';card.style.cursor='default';seen[i]=true;spark(e.clientX,e.clientY);if(seen[0]&&seen[1])rw(e);};row.appendChild(card);});
  w.appendChild(row);return b;}

// —— S4 选数据·训练·评判 ——
function buildData(rw,onReset){var b=ixbox('🧺 选数据喂给 AI，再训练','勾几个数据，看学得好不好',onReset);var w=b._body;
  var POOL=[{e:'🐱',t:'清晰的猫',good:1},{e:'🐈‍⬛',t:'黑猫·多样',good:1},{e:'🐱',t:'另一只猫',good:1},{e:'🐶',t:'狗·标成猫',bad:1},{e:'🍊',t:'橘子·标成猫',bad:1},{e:'🌫️',t:'太模糊',bad:1}];var sel={},phase='pick';
  var grid=el('div');grid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px';
  POOL.forEach(function(o,i){var d=el('div');d.style.cssText='padding:8px 4px;border-radius:10px;background:#fff;border:2px solid #e6e9f2;text-align:center;cursor:pointer';d.innerHTML='<div style="font-size:24px">'+o.e+'</div><div style="font-size:10px;color:#8b90a6">'+o.t+'</div>';d.onclick=function(){if(phase!=='pick')return;sel[i]=!sel[i];d.style.borderColor=sel[i]?'#8b5cf6':'#e6e9f2';d.style.background=sel[i]?'#f5f3ff':'#fff';};grid.appendChild(d);});
  var btn=el('button','btn btn-glow','🚀 开始训练');btn.style.cssText+=';display:block;margin:0 auto';
  var res=el('div');res.style.cssText='text-align:center;margin-top:8px;font-size:13px;color:#4b4869';
  btn.onclick=function(e){if(phase==='done')return;var p=Object.keys(sel).filter(function(k){return sel[k];}).map(function(k){return POOL[+k];});if(p.length<2){toast('至少选 2 个',false);return;}phase='done';var g=p.filter(function(x){return x.good;}).length,bd=p.filter(function(x){return x.bad;}).length;var acc=Math.max(10,Math.min(95,30+g*16-bd*22));var v;if(bd>0){v='<b style="color:#dc2626">混了坏数据，AI 学偏了 😵</b>';toast('😵 学偏了!',false);}else if(g>=3){v='<b style="color:#16a34a">好数据！AI 学得棒 👍</b>';toast('👍 学得好!',true);}else{v='<b style="color:#b45309">数据太单一，一般般 🤔</b>';}res.innerHTML='准确率 <b style="font-size:18px;color:#6d28d9">'+acc+'%</b> · '+v;rw(e);};
  w.appendChild(grid);w.appendChild(btn);w.appendChild(res);return b;}

// —— S5 死记 vs 举一反三(过拟合) ——
function buildOverfit(rw,onReset){var b=ixbox('📉 拖一拖：死记还是抓规律','拖到绿色"刚刚好"',onReset);var w=b._body;
  var cv=document.createElement('canvas');cv.width=280;cv.height=120;cv.style.cssText='width:100%;background:#160f33;border-radius:8px';var ctx=cv.getContext('2d');
  var P=[];for(var i=0;i<11;i++){var x=14+i*25,y=38+i*3+(Math.random()*48-24);P.push({x:x,y:Math.max(12,Math.min(108,y))});}var c=0.12,got=false;
  function sY(x){var a=P[0],z=P[P.length-1];return a.y+(z.y-a.y)*(x-a.x)/(z.x-a.x);}
  function zY(x){for(var i=0;i<P.length-1;i++){if(x>=P[i].x&&x<=P[i+1].x){var t=(x-P[i].x)/(P[i+1].x-P[i].x);return P[i].y+(P[i+1].y-P[i].y)*t;}}return P[P.length-1].y;}
  function draw(){ctx.clearRect(0,0,280,120);ctx.strokeStyle='#22d3ee';ctx.lineWidth=2.5;ctx.beginPath();for(var x=P[0].x;x<=P[P.length-1].x;x++){var y=sY(x)*(1-c)+zY(x)*c;x===P[0].x?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();P.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,4,0,7);ctx.fillStyle='#ffe066';ctx.fill();ctx.lineWidth=1.5;ctx.strokeStyle='#160f33';ctx.stroke();});}
  var lbl=el('div',null,'');lbl.style.cssText='text-align:center;font-size:12.5px;color:#4b4869;margin:6px 0';
  var rng=el('input');rng.type='range';rng.min=0;rng.max=100;rng.value=12;rng.style.cssText='width:100%;accent-color:#8b5cf6';
  function upd(e){c=+rng.value/100;draw();lbl.innerHTML=c<0.3?'线太直——<b>没抓到规律</b>':c<0.72?'<b style="color:#16a34a">刚刚好！抓住了大趋势</b>':'线太扭——<b style="color:#dc2626">死记每个点</b>';if(c>=0.3&&c<0.72&&e&&!got){got=true;rw(e);}}
  rng.oninput=upd;w.appendChild(cv);w.appendChild(rng);w.appendChild(lbl);draw();upd();return b;}

// —— S6 骗过 AI ——
function buildFool(rw,onReset){var b=ixbox('🕵️ 试试骗过 AI','按步骤走：给它看 → 偷偷改 → 再给它看',onReset);var w=b._body;

function buildTree(rw,onReset){var b=ixbox('🌲 AI 用问题一层层猜','点问号展开它的判断',onReset);var w=b._body;w.style.textAlign='left';var got=false;
  var T={q:'会汪汪叫吗？',y:{q:'体型大吗？',y:{r:'🐕 大狗'},n:{r:'🐩 小狗'}},n:{q:'会喵喵叫吗？',y:{r:'🐱 猫'},n:{r:'🐣 别的'}}};
  function node(t,dep){var box=el('div');box.style.marginLeft=(dep*14)+'px';if(t.r){var o=el('div',null,t.r);o.style.cssText='display:inline-block;margin:4px 0;padding:5px 11px;border-radius:8px;background:#dcfce7;color:#15803d;font-weight:800';box.appendChild(o);return box;}var q=el('div',null,'❓ '+t.q+' <span style="color:#8b5cf6">▼</span>');q.style.cssText='display:inline-block;margin:4px 0;padding:5px 11px;border-radius:8px;background:#ede9fe;color:#6d28d9;font-weight:800;cursor:pointer';var kids=el('div');kids.style.display='none';var op=false;q.onclick=function(e){op=!op;kids.style.display=op?'block':'none';q.innerHTML='❓ '+t.q+' <span style="color:#8b5cf6">'+(op?'▲':'▼')+'</span>';if(op&&!kids.hasChildNodes()){var y=el('div',null,'<span style="color:#16a34a;font-size:12px;font-weight:800">是→</span>');y.style.marginLeft=(dep*14+14)+'px';y.appendChild(node(t.y,dep+1));var n=el('div',null,'<span style="color:#dc2626;font-size:12px;font-weight:800">否→</span>');n.style.marginLeft=(dep*14+14)+'px';n.appendChild(node(t.n,dep+1));kids.appendChild(y);kids.appendChild(n);}if(op&&!got){got=true;rw(e);}};box.appendChild(q);box.appendChild(kids);return box;}

// —— 章末挑战(自动节奏) ——
function buildChallenge(onWin,onReset){var b=ixbox('🎮 训练师大挑战','猫🐱出现就点它！点错扣分',onReset);var w=b._body;
  if(window._chT){clearInterval(window._chT);window._chT=null;}
  var score=0,goal=5,pool=['🐱','🍎','🐶','🐱','🍊','🐱','🌫️','🐱','🐭','🐱'];
  var sc=el('div',null,'0 / '+goal);sc.style.cssText='text-align:center;font-weight:900;color:#6d28d9;font-size:18px';
  var stage=el('div',null,'🐱');stage.style.cssText='font-size:56px;text-align:center;min-height:72px;cursor:pointer';
  var msg=el('div',null,'看到猫就点它！');msg.style.cssText='text-align:center;font-size:12px;color:#6b7280;margin-top:4px';
  function rnd(){stage.textContent=pool[Math.floor(Math.random()*pool.length)];}
  window._chT=setInterval(rnd,1050);
  stage.onclick=function(e){if(stage.textContent==='🐱'){score++;spark(e.clientX,e.clientY);sc.textContent=score+' / '+goal;if(score>=goal){clearInterval(window._chT);window._chT=null;msg.textContent='🎉 通关！你是合格的训练师！';onWin(e);return;}rnd();}else{score=Math.max(0,score-1);sc.textContent=score+' / '+goal;toast('那不是猫～',false);}};
  w.appendChild(sc);w.appendChild(stage);w.appendChild(msg);return b;}

 {n:1,heading:'老办法 vs 新办法',hook:'<span class="apo">阿波：</span>考考你——手机相册怎么把<b>所有</b>猫照片自动挑出来的？难道有人一张张标好的吗？😏',build:buildSort,

 {n:2,heading:'训练：看例子→猜→调整',hook:'<span class="apo">阿波：</span>说来不怕你笑，我刚"出生"时认猫 10 次错 8 次。看我怎么变高手👇',build:buildCrank,

 {n:3,heading:'有人教 vs 自己悟',hook:'<span class="apo">阿波：</span>我学东西有两种路子——有时有老师给答案，有时全靠自己琢磨。点开看看👇',build:buildCompare,

 {n:4,heading:'垃圾进，垃圾出',hook:'<span class="apo">阿波：</span>要是喂我的图<b>有问题</b>呢？这关任务：亲手把我教坏！😈',build:buildData,

function buildPool(rw,onReset){var b=ixbox('🗜️ 池化：一层层缩小','点"压缩一层"，8→4→2→1',onReset);var w=b._body;
  function rnd(n){var m=[];for(var r=0;r<n;r++){m.push([]);for(var c=0;c<n;c++)m[r].push(Math.floor(Math.random()*10));}return m;}
  var stages=[rnd(8)],got=false;
  var wrap=el('div');wrap.style.cssText='display:flex;gap:8px;align-items:center;overflow-x:auto;padding:4px;justify-content:center';
  var msg=el('div',null,'');msg.style.cssText='text-align:center;font-size:12.5px;color:#6b7280;margin:6px 0;min-height:16px';
  var btn=el('button','btn btn-glow','🗜️ 压缩一层');btn.style.cssText+=';display:block;margin:0 auto';
  function mkgrid(m){var sz=Math.max(11,Math.min(24,96/m.length));var g=el('div');g.style.cssText='flex:none;display:grid;grid-template-columns:repeat('+m.length+','+sz+'px);gap:2px';m.forEach(function(row){row.forEach(function(v){var d=el('div',null,m.length<=4?v:'');d.style.cssText='width:'+sz+'px;height:'+sz+'px;border-radius:3px;background:hsl(258,60%,'+(88-v*6)+'%);color:'+(v>5?'#fff':'#333')+';display:grid;place-items:center;font-size:11px;font-weight:800';g.appendChild(d);});});return g;}
  function pool(m){var n=m.length/2,r=[];for(var i=0;i<n;i++){r.push([]);for(var j=0;j<n;j++)r[i].push(Math.max(m[2*i][2*j],m[2*i][2*j+1],m[2*i+1][2*j],m[2*i+1][2*j+1]));}return r;}
  function draw(){wrap.innerHTML='';stages.forEach(function(m,i){if(i>0){var ar=el('div',null,'→');ar.style.cssText='flex:none;font-size:18px;color:#8b5cf6';wrap.appendChild(ar);}wrap.appendChild(mkgrid(m));});}
  btn.onclick=function(e){var last=stages[stages.length-1];if(last.length<=1){msg.textContent='已缩到 1×1！';return;}stages.push(pool(last));draw();if(!got){got=true;rw(e);}if(stages[stages.length-1].length===1){msg.textContent='缩到 1×1——只剩最强信号！';toast('🗜️ 缩到最小!',true);}};
  w.appendChild(wrap);w.appendChild(msg);w.appendChild(btn);draw();return b;}

function buildWave(rw,onReset){var b=ixbox('🔊 声音是波形数字','拖"音量"滑块，看波形变化',onReset);var w=b._body;

  function draw(){view.textContent=sent.join('');cand.innerHTML='';(G[cur]||[]).forEach(function(o){var bn=el('button','btn'+(o.ok?' btn-glow':' btn-ghost'),o.w);bn.style.cssText+=';padding:7px 14px;font-size:14px';bn.onclick=function(e){if(!o.ok){toast('接不顺～',false);return;}sent.push(o.w);spark(e.clientX,e.clientY);if(o.end){wins++;sc.textContent='说通 '+wins+' / 2 句';if(wins>=2){onWin(e);return;}toast('✓ 一句!',true);start();}else{cur=o.w;draw();}};cand.appendChild(bn);});}
  w.appendChild(sc);w.appendChild(view);w.appendChild(cand);start();return b;}

// —— 「说」章内容(7 节) ——
CHAPTERS['说']={id:'说',title:'💬 说 · AI 怎么听懂人话？',badge:{e:'🏅',t:'语言大师',s:'你搞懂了 AI 是怎么理解和生成语言的'},endGame:buildChainPK,sections:[
 {n:1,heading:'核心：一直猜下一个词',hook:'<span class="apo">阿波：</span>你手机打字才打"今天天"，它就猜出"气"——我和 ChatGPT 用的是同一个把戏！玩玩接龙👇',build:buildWordChain,
  paras:['像 ChatGPT 这样的[[大语言模型]]，一辈子只练一件事：猜下一个词。','你给半句话，它就想"接下来最可能是哪个词"，接上去。','一个接一个，就成了一整段话。'],
  terms:{'大语言模型':{s:'读过海量文字、专门练"猜下一个词"的 AI，ChatGPT、DeepSeek 都是。',pro:'英文叫 LLM（Large Language Model）；它其实不"懂"意思，只是根据见过的海量句子猜最可能的接法。'}},peg:'🎭 它在猜，不在懂',close:'所以它不是"懂"你，只是猜——只不过见得太多，猜得很准。',nextHint:'它读句子之前，先要把句子怎么处理一下？'},
 {n:2,heading:'先把句子切成小块',hook:'<span class="apo">阿波：</span>我读句子前，会先把它"咔嚓"切成一小块一小块。点点看👇',build:buildTokenize,
  paras:['我读文字前，先把句子切成一小块一小块，每块叫一个[[token]]。','然后一块一块地读、一块一块地猜。'],
  terms:{'token':{s:'AI 把句子切成的一小块，可能是一个词或一个字。',pro:'中文叫"词元"；模型不是按整句处理，而是把文字都换成一个个 token 再计算。'}},peg:'',close:'切成 token，是我读懂文字的第一步。',nextHint:'那我是一个字一个字慢慢读，还是有更快的办法？'},
 {n:3,heading:'排队读 vs 一眼看',hook:'<span class="apo">阿波：</span>旧办法一个字一个字排队读，慢；新办法一眼看完整句，快！点两个按钮比比👇',build:buildSeqVsParallel,
  paras:['旧办法（叫 [[RNN]]）像排队：读完一个字才读下一个，句子长了就慢、还容易忘前面。','新办法像一眼扫完整句，所有字一起看——又快又不会忘。'],
  terms:{'RNN':{s:'一种"排队读"的老式 AI：读完一个字才读下一个。',pro:'全称循环神经网络（Recurrent Neural Network）；句子一长就慢、还容易忘掉前面，后来被更快的新办法取代。'}},peg:'',close:'新办法又快又记得牢，这是现在大模型能这么强的关键一步。',nextHint:'"一起看整句"——它具体是怎么看的？'},
 {n:4,heading:'注意力 + 知道位置',hook:'<span class="apo">阿波：</span>一起看整句时，每个词会去"看"和它有关的词——比如"它"指的是谁。点词看连线👇',build:buildAttention,
  paras:['读句子时，每个词会去"关注"句子里和它有关的词，这叫[[注意力机制]]。','靠这个，我能搞清"小猫在沙发上睡觉"里是谁在睡觉。','另外，"我打你"和"你打我"不一样——所以我还得知道每个词排在第几位。'],
  terms:{'注意力机制':{s:'读句子时，每个词会去"关注"和它有关的词。'},'Transformer':{s:'用注意力、能"一眼看整句"的新式 AI 结构。',pro:'如今几乎所有大模型都建在 Transformer 上；它 2017 年被提出，彻底改变了 AI。'}},peg:'',close:'这套"注意力 + 知道位置"的新结构，叫[[Transformer]]——现在的大模型几乎都用它。',nextHint:'这么厉害的本事，它是怎么学会的？'},
 {n:5,heading:'读遍互联网，越大越聪明',hook:'<span class="apo">阿波：</span>我的本事哪来的？我读了几乎整个互联网的文字！而且书读得越多、脑子越大，我就越聪明。点点看👇',build:buildDataScale,
  paras:['我先把几乎整个互联网的文字都"读"一遍，这一步叫[[预训练]]。','有意思的是：与其一条条教我规则，不如给我更多文字、更大的脑子——我自己就会更强。','这条"越大越聪明"的规律，是 AI 这些年最重要的发现之一。'],
  terms:{'预训练':{s:'让 AI 先把海量文字读一遍、打好底子的过程。'}},peg:'🧲 多喂数据，真的管用',close:'这就是为什么 AI 越做越大——因为"多喂数据、多给算力"真的管用。',nextHint:'读了这么多，它说话是死板还是会变花样？'},
 {n:6,heading:'温度：有多"放飞"',hook:'<span class="apo">阿波：</span>同一个问题，我能答得很稳，也能答得很放飞——由一个叫"温度"的旋钮控制。拖拖看👇',build:buildTemperature,
  paras:['有个叫[[温度]]的设置，决定我说话有多大胆。','温度低，我只挑最稳的词，答得规矩；温度高，我敢挑冷门词，有创意甚至离谱。'],
  terms:{'温度':{s:'控制 AI 说话有多"随机大胆"的一个设置。'}},peg:'',close:'所以同一个 AI，调调温度，可以很规矩、也可以很有想象力。',nextHint:'它这么能说，说的都是真的吗？'},
 {n:7,heading:'它会一本正经地胡说',hook:'<span class="apo">阿波：</span>我坦白——我有时会一本正经地胡说，还特别自信！你能分辨吗？来判断👇',build:buildHallucination,
  paras:['我不是故意骗人，但有时会把假的说得像真的一样——这叫[[幻觉]]。','因为我只是在"猜最像的接法"，并不真的知道对错。','所以我说的话，重要的一定要自己再核实。'],
  terms:{'幻觉':{s:'AI 一本正经地说出错误、编造的内容。',pro:'它并非故意撒谎，而是因为只在"猜最可能的词"，压根没有"知道对错"这回事。'}},peg:'🎭 很会说≠说得对',close:'记住：我很会说，但不等于我说的都对。',nextHint:null}
]};

function buildOnlyTalk(rw,onReset){var b=ixbox('💬 只会说 vs 🛠️ 会做','点"问问看"，比比两种 AI',onReset);var w=b._body;var Q=[{q:'现在几点？',t:'呃…我不知道现在几点',a:'（看了下时钟）下午 3:15！'},{q:'帮我把灯关了',t:'我只能告诉你怎么关…',a:'（咔哒）灯关啦 💡'},{q:'123×456 等于多少？',t:'大概…五万多？我算不准',a:'（用计算器）等于 56088！'}],i=0,got=false,open=false;
  var qd=el('div');qd.style.cssText='text-align:center;font-weight:800;font-size:16px;color:#1e1b3a;margin-bottom:8px';
  var rows=el('div');rows.style.cssText='min-height:72px';
  var btn=el('button','btn btn-glow','🙋 问问看');btn.style.cssText+=';display:block;margin:0 auto';
  function show(){qd.textContent='你问：「'+Q[i%Q.length].q+'」';rows.innerHTML='';btn.textContent='🙋 问问看';open=false;}
  btn.onclick=function(e){if(!open){var o=Q[i%Q.length];rows.innerHTML='<div style="background:#eef1f6;border-radius:10px;padding:8px 12px;margin:6px 0;font-size:13px;color:#8b90a6">💬 只会聊天的 AI：'+o.t+'</div><div style="background:#ecfdf5;border-radius:10px;padding:8px 12px;font-size:13px;color:#15803d;font-weight:700">🛠️ 会做事的 AI：'+o.a+'</div>';if(!got){got=true;rw(e);}btn.textContent='下一个问题 →';open=true;}else{i++;show();}};
  w.appendChild(qd);w.appendChild(rows);w.appendChild(btn);show();return b;}

function buildToolUse(rw,onReset){var b=ixbox('🧰 给 AI 挑工具','看任务，点它该用哪个工具',onReset);var w=b._body;var T=[{task:'算 23×47 等于多少',right:'🧮',tip:'计算器'},{task:'查今天的天气',right:'🌤️',tip:'天气查询'},{task:'把这段话翻成英文',right:'🌐',tip:'翻译'},{task:'画一只彩色小狗',right:'🎨',tip:'画图'}],ALL=['🧮','🌤️','🌐','🎨'],i=0,got=false;
  var tk=el('div');tk.style.cssText='text-align:center;font-weight:800;font-size:15px;color:#1e1b3a;margin-bottom:10px';
  var tools=el('div');tools.style.cssText='display:flex;gap:10px;justify-content:center';var msg=el('div',null,'');msg.style.cssText='text-align:center;font-size:12.5px;color:#6b7280;margin-top:8px;min-height:16px';
  function show(){tk.textContent='任务：'+T[i%T.length].task;msg.textContent='';tools.innerHTML='';ALL.forEach(function(t){var bn=el('button','btn btn-ghost',t);bn.style.cssText+=';font-size:22px;padding:8px 12px';bn.onclick=function(e){if(t===T[i%T.length].right){spark(e.clientX,e.clientY);msg.innerHTML='<b style="color:#16a34a">对！该用「'+T[i%T.length].tip+'」</b>';if(!got){got=true;rw(e);}setTimeout(function(){i++;show();},900);}else{toast('这个工具不对～',false);}};tools.appendChild(bn);});}
  w.appendChild(tk);w.appendChild(tools);w.appendChild(msg);show();return b;}

function buildAgentPlan(rw,onReset){var b=ixbox('🧭 Agent 拆解任务','点"下一步"，看它怎么规划',onReset);var w=b._body;var steps=['① 先想主题：给谁、什么风格','② 查一张好看的背景图','③ 加上"生日快乐"文字','④ 调整颜色和排版','⑤ 导出图片给你'],i=-1,got=false;
  var gd=el('div',null,'🎯 任务：帮我做一张生日海报');gd.style.cssText='text-align:center;font-weight:800;color:#6d28d9;margin-bottom:8px';
  var list=el('div');list.style.cssText='min-height:120px';
  var btn=el('button','btn btn-glow','下一步 →');btn.style.cssText+=';display:block;margin:6px auto 0';
  btn.onclick=function(e){if(i<steps.length-1){i++;var d=el('div',null,steps[i]);d.style.cssText='background:#f5f3ff;border-radius:8px;padding:7px 12px;margin:5px 0;font-size:13px;animation:popIn .3s both';list.appendChild(d);if(i===steps.length-1){btn.style.display='none';toast('🎉 规划完成!',true);if(!got){got=true;rw(e);}}}};
  w.appendChild(gd);w.appendChild(list);w.appendChild(btn);return b;}

function buildRAG(rw,onReset){var b=ixbox('📚 先查资料，再回答','点"查资料库"，看它怎么答得更准',onReset);var w=b._body;var got=false;
  var q=el('div',null,'你问：「我们学校图书馆几点关门？」');q.style.cssText='text-align:center;font-weight:800;color:#1e1b3a;margin-bottom:8px';
  var stage=el('div');stage.style.cssText='text-align:center;min-height:74px';stage.innerHTML='<div style="color:#8b90a6;font-size:13px">💬 光凭记忆：我不太确定…可能 5 点？</div>';
  var btn=el('button','btn btn-glow','📚 让它查资料库');btn.style.cssText+=';display:block;margin:8px auto 0';
  btn.onclick=function(e){stage.innerHTML='<div style="font-size:13px;color:#6b7280">🔍 正在翻学校的资料…</div>';btn.style.display='none';setTimeout(function(){stage.innerHTML='<div style="background:#ecfdf5;border-radius:10px;padding:10px;color:#15803d;font-weight:700">📖 查到啦：图书馆每天 <b>晚上 8 点</b>关门！</div>';toast('📚 查到准确答案!',true);if(!got){got=true;rw(e);}},700);};
  w.appendChild(q);w.appendChild(stage);w.appendChild(btn);return b;}

function buildLoop(rw,onReset){var b=ixbox('🔄 想 → 做 → 看 → 再想','点"走一步"，看它一步步做完',onReset);var w=b._body;var steps=[['🤔','想','该先干嘛？——先搜索资料'],['🖐️','做','用搜索工具查一下'],['👀','看','结果对不对？——差一点'],['🤔','想','再换个词搜搜看'],['🖐️','做','用新词再查一次'],['👀','看','这下对了！✅ 完成']],i=-1,got=false;
  var ic=el('div',null,'🔄');ic.style.cssText='font-size:44px;text-align:center';var tt=el('div',null,'点"走一步"开始');tt.style.cssText='text-align:center;font-weight:800;color:#6d28d9';var ds=el('div',null,'');ds.style.cssText='text-align:center;font-size:13px;color:#4b4869;min-height:20px';
  var btn=el('button','btn btn-glow','▶ 走一步');btn.style.cssText+=';display:block;margin:8px auto 0';
  btn.onclick=function(e){if(i<steps.length-1){i++;ic.textContent=steps[i][0];tt.textContent=steps[i][1];ds.textContent=steps[i][2];if(i===steps.length-1){btn.style.display='none';toast('🎉 任务完成!',true);if(!got){got=true;rw(e);}}}};
  w.appendChild(ic);w.appendChild(tt);w.appendChild(ds);w.appendChild(btn);return b;}

function buildAuthorize(rw,onReset){var b=ixbox('🚦 该不该让 AI 自己做','点任务，再点它该进哪个筐',onReset);var w=b._body;var DATA=[{e:'📖 查资料',a:1},{e:'💸 花钱买东西',a:0},{e:'✍️ 写作业草稿',a:1},{e:'🗑️ 删掉文件',a:0},{e:'🎨 生成一张图',a:1},{e:'📧 替我发消息',a:0}],sel=null,left=DATA.length,got=false;
  var row=el('div');row.style.cssText='display:flex;gap:8px;flex-wrap:wrap;justify-content:center;min-height:44px;margin-bottom:10px';
  DATA.forEach(function(f){var d=el('div',null,f.e);d.style.cssText='padding:7px 10px;border-radius:10px;background:#fff;border:2px solid #e6e9f2;font-size:13px;cursor:pointer';d.onclick=function(){if(sel&&sel.d===d){d.style.borderColor='#e6e9f2';sel=null;return;}row.querySelectorAll('div').forEach(function(x){x.style.borderColor='#e6e9f2';});d.style.borderColor='#ffd66d';sel={d:d,a:f.a};};row.appendChild(d);});
  var bins=el('div');bins.style.cssText='display:flex;gap:10px';
  [['✅ 可以自己做',1],['🙋 得先问我',0]].forEach(function(x){var bn=el('div',null,x[0]);bn.style.cssText='flex:1;padding:12px;border-radius:12px;border:2.5px dashed #b7abdf;text-align:center;font-weight:800;color:#6d28d9;cursor:pointer;font-size:13px';bn.onclick=function(e){if(!sel)return;if(sel.a===x[1]){spark(e.clientX,e.clientY);sel.d.style.transition='.25s';sel.d.style.transform='scale(0)';var dd=sel.d;setTimeout(function(){dd.remove();},250);left--;sel=null;if(!got){got=true;rw(e);}if(left===0)toast('全分对！懂授权 ✓',true);}else{bn.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:300});}};bins.appendChild(bn);});
  w.appendChild(row);w.appendChild(bins);return b;}

function buildCommander(onWin,onReset){var b=ixbox('🎮 小小指挥官','派任务、选对工具，答对 4 个通关！',onReset);var w=b._body;var T=[{task:'算 88+57',right:'🧮'},{task:'查明天天气',right:'🌤️'},{task:'翻译"你好"',right:'🌐'},{task:'画一只小猫',right:'🎨'},{task:'查图书馆几点关',right:'📚'}],ALL=['🧮','🌤️','🌐','🎨','📚'],score=0,goal=4,cur;
  var sc=el('div',null,'0 / 4');sc.style.cssText='text-align:center;font-weight:900;color:#6d28d9;font-size:18px';
  var tk=el('div');tk.style.cssText='text-align:center;font-weight:800;margin:6px 0';
  var tools=el('div');tools.style.cssText='display:flex;gap:8px;justify-content:center;flex-wrap:wrap';
  function show(){cur=T[Math.floor(Math.random()*T.length)];tk.textContent='任务：'+cur.task;tools.innerHTML='';ALL.forEach(function(t){var bn=el('button','btn btn-ghost',t);bn.style.cssText+=';font-size:22px;padding:8px 12px';bn.onclick=function(e){if(t===cur.right){score++;spark(e.clientX,e.clientY);sc.textContent=score+' / '+goal;if(score>=goal){onWin(e);return;}show();}else{toast('工具不对～',false);}};tools.appendChild(bn);});}
  w.appendChild(sc);w.appendChild(tk);w.appendChild(tools);show();return b;}

// —— 「做」章内容(6 节) ——
CHAPTERS['做']={id:'做',title:'🛠️ 做 · AI 会自己动手做事',badge:{e:'🏅',t:'AI 指挥官',s:'你学会了怎么让 AI 帮你做事'},endGame:buildCommander,sections:[
 {n:1,heading:'只会说，还不够',hook:'<span class="apo">阿波：</span>我会聊天，但你发现没——我不知道现在几点、也帮你关不了灯！点点看👇',build:buildOnlyTalk,
  paras:['只会聊天的我，有几个大短板：查不到最新消息、算不准复杂账、动不了手做事。','所以聪明的办法是：给我配上"手脚"，让我能真的做事。'],
  terms:{},peg:'',close:'会说，只是第一步；会做，才更有用。',nextHint:'那怎么让只会说的我，也能动手做事？'},
 {n:2,heading:'给 AI 装上"手脚"：用工具',hook:'<span class="apo">阿波：</span>秘诀是给我一个"工具箱"！算数用计算器、查天气用天气工具……看任务点对工具👇',build:buildToolUse,
  paras:['我自己算不准、查不到的事，就交给专门的工具去做。','需要算数就调计算器，需要查天气就调天气工具——这叫[[工具调用]]。'],
  terms:{'工具调用':{s:'AI 自己去用外部工具（计算器、搜索、翻译…）来完成任务。'}},peg:'🎭 它借工具做事，不是自己什么都会',close:'学会用工具，我就从"只会说"变成"能做事"了。',nextHint:'一个会用工具、还会自己安排的 AI，叫什么？'},
 {n:3,heading:'Agent：会用工具、会规划',hook:'<span class="apo">阿波：</span>把"会说的大脑"+"工具手脚"+"会规划"合在一起，就成了 Agent！看它怎么拆任务👇',build:buildAgentPlan,
  paras:['[[Agent]] = 会说的大脑 + 会用的工具 + 会把大任务拆成小步骤。','你给它一个目标，它自己想步骤、一步步做完。'],
  terms:{'Agent':{s:'能自己用工具、把大任务拆成小步骤做完的 AI。',pro:'中文叫"智能体"；它以大模型为大脑，配上工具和规划能力，就能自主完成多步任务。'}},peg:'',close:'能自己规划、自己动手的 AI，就是 Agent（智能体）。',nextHint:'它遇到不知道的知识，会不会瞎编？'},
 {n:4,heading:'先查资料，再回答',hook:'<span class="apo">阿波：</span>我记不住所有细节，容易记混。有个好办法：先去查资料库，再回答！点点看👇',build:buildRAG,

  var cells=S.map(function(s){var d=el('div',null,s[0]+'<div style="font-size:10px">'+s[1]+'</div>');d.style.cssText='width:48px;padding:8px 0;border-radius:10px;background:#e6e9f2;text-align:center;font-size:22px;transition:.3s;filter:grayscale(1);opacity:.5';row.appendChild(d);return d;});
  var btn=el('button','btn btn-glow','🚀 启程！');btn.style.cssText+=';display:block;margin:10px auto 0';
  btn.onclick=function(e){cells.forEach(function(d,i){setTimeout(function(){d.style.filter='none';d.style.opacity='1';d.style.background='#f5f3ff';},i*200);});btn.style.display='none';setTimeout(function(){toast('🚀 出发!',true);if(!got){got=true;rw(e);}},1000);};
  w.appendChild(row);w.appendChild(btn);return b;}

function buildMagicDash(onWin,onReset){var b=ixbox('🎮 魔法大搜捕','快判！答对 5 个就毕业启程',onReset);var w=b._body;
  var Q=[{t:'刷视频给你推荐内容',ai:1},{t:'尺子量长度',ai:0},{t:'人脸解锁手机',ai:1},{t:'风扇转起来',ai:0},{t:'翻译软件翻句子',ai:1},{t:'手电筒发光',ai:0},{t:'拍照自动美颜',ai:1}];
  for(var _s=Q.length-1;_s>0;_s--){var _j=Math.floor(Math.random()*(_s+1)),_t=Q[_s];Q[_s]=Q[_j];Q[_j]=_t;}var i=0,score=0,goal=5;
  var sc=el('div',null,'0 / 5');sc.style.cssText='text-align:center;font-weight:900;color:#6d28d9;font-size:18px';
  var card=el('div');card.style.cssText='text-align:center;font-weight:700;font-size:15px;color:#1e1b3a;min-height:44px;display:grid;place-items:center;padding:6px';
  var bw=el('div');bw.style.cssText='display:flex;gap:12px;justify-content:center;margin-top:8px';
  function show(){card.textContent=Q[i%Q.length].t;}
  [['🤖 AI 的',1],['⚙️ 不是',0]].forEach(function(x){var bn=el('button','btn btn-ghost',x[0]);bn.onclick=function(e){if(Q[i%Q.length].ai===x[1]){score++;spark(e.clientX,e.clientY);sc.textContent=score+' / '+goal;if(score>=goal){onWin(e);return;}}else{toast('再想想～',false);}i++;show();};bw.appendChild(bn);});
  w.appendChild(sc);w.appendChild(card);w.appendChild(bw);show();return b;}

CHAPTERS['序']={id:'序',title:'🎬 序 · AI 到底是不是魔法？',badge:{e:'🏅',t:'启程者',s:'你踏上了 AI 探险之旅'},endGame:buildMagicDash,sections:[
 {n:1,heading:'AI 不是魔法',hook:'<span class="apo">阿波：</span>嗨！我是阿波🤖，你的 AI 向导！先考考你——这些事，哪些是 AI"学"来的本事？👇',build:buildMagicOrLearn,

// ========== 章节渲染 ==========
var curSec=0;
function enterChapter(id){CH=CHAPTERS[id];show('scr-ch');document.getElementById('chtitle').textContent=CH.title;curSec=0;document.getElementById('chbody').innerHTML='';syncTop();renderSec();}
function renderSec(){
  if(curSec>=CH.sections.length){renderEnd();return;}
  var sec=CH.sections[curSec];
  var wrap=el('div','section');
  wrap.appendChild(el('div','section-heading','<span class="section-num">'+sec.n+'</span>'+sec.heading));
  wrap.appendChild(el('div','hook',sec.hook));
  var host=el('div');
  var rw=function(ev){var k=CH.id+'.'+sec.n;if(ST.collected[k])return;ST.collected[k]=true;save();awardCoins(10,ev);};
  function mountIx(){host.innerHTML='';host.appendChild(sec.build(rw,mountIx));}
  mountIx();wrap.appendChild(host);
  sec.paras.forEach(function(p){wrap.appendChild(parseP(p,sec.terms));});
  wrap.appendChild(parseP(sec.close,sec.terms));
  wrap.appendChild(el('div','peg',sec.peg));
  var nw=el('div','next-wrap');var btn=el('button','next-btn',sec.nextHint||'完成这一章 →');
  btn.onclick=function(){curSec++;renderSec();};
  nw.appendChild(btn);wrap.appendChild(nw);
  document.getElementById('chbody').appendChild(wrap);
  wrap.scrollIntoView({behavior:'smooth',block:'start'});
}
function renderEnd(){var wrap=el('div','section');wrap.appendChild(el('div','section-heading','<span class="section-num">🎮</span>通关挑战'));var host=el('div');function mountG(){host.innerHTML='';host.appendChild((CH.endGame||buildChallenge)(function(e){finishChapter(e);},mountG));}mountG();wrap.appendChild(host);document.getElementById('chbody').appendChild(wrap);wrap.scrollIntoView({behavior:'smooth'});}
function finishChapter(e){if(!ST.done[CH.id])awardCoins(50,e);if(ST.badges.indexOf(CH.badge.t)<0)ST.badges.push(CH.badge.t);ST.done[CH.id]=true;save();syncTop();
  var wrap=el('div','section');wrap.style.textAlign='center';
  wrap.appendChild(el('div',null,'<div style="font-size:20px;font-weight:900;color:#16a34a">🎉 恭喜通关「学」章！</div>'));
  var drop=el('div','badge-drop','<div class="bd-emoji">'+CH.badge.e+'</div><div class="bd-t">'+CH.badge.t+'</div><div class="bd-s">'+CH.badge.s+'</div>');drop.style.cssText+=';margin:16px auto 0';wrap.appendChild(drop);
  var nw=el('div','next-wrap');var btn=el('button','next-btn','🗺️ 回地图（已解锁下一站）');btn.onclick=goMap;nw.appendChild(btn);wrap.appendChild(nw);
  document.getElementById('chbody').appendChild(wrap);wrap.scrollIntoView({behavior:'smooth'});}

// ========== 启动 ==========
syncTop();goMap();
